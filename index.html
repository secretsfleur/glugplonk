 — sorbate + sulphite","instruction":"Add the potassium sorbate sachet. Then add 1 crushed Campden tablet dissolved in cold water. Stir gently.","coach_message":"Larger batch, same principle. Two-part stabilisation for a wine with more phenolic complexity.","why_text":"Sorbate prevents re-fermentation. Sulphite provides antioxidant protection.","warning_text":"Do not add to actively fermenting wine.","celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"kit-cabernet-premium-s09","journey_id":"kit-cabernet-premium","phase_id":"kit-cabernet-premium-phase-3","step_number":9,"day_label":"Day 11","tagline":"Part one of two.","title":"Add kieselsol — first fining agent","instruction":"Add the kieselsol sachet. Stir vigorously for 90 seconds — larger batch needs more thorough distribution.","coach_message":"Negatively charged particles spreading through 23 litres of Cabernet.","why_text":"Kieselsol needs even distribution. Larger batches need longer stirring — 90 seconds for 23L.","warning_text":"Stir longer than you think necessary.","celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"kit-cabernet-premium-s10","journey_id":"kit-cabernet-premium","phase_id":"kit-cabernet-premium-phase-3","step_number":10,"day_label":"Day 12","tagline":"Part two of two.","title":"Add chitosan — second fining agent","instruction":"Exactly 24 hours after kieselsol, add chitosan sachet. Stir vigorously 90 seconds. Do not move carboy for 5–7 days.","coach_message":"Chitosan finds kieselsol. Bond, get heavy, sink.","why_text":"The same electrostatic process applies at 23L — slightly longer settling time.","warning_text":"Not vegan? Chitosan is typically shellfish-derived.","celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"kit-cabernet-premium-s11","journey_id":"kit-cabernet-premium","phase_id":"kit-cabernet-premium-phase-4","step_number":11,"day_label":"Day 18","tagline":"Deep ruby. Clear through.","title":"Clarity check and final gravity","instruction":"Two gravity readings 24 hours apart — both at 0.994–1.000? Hold carboy to torch. Deep clear ruby with sediment at bottom?","coach_message":"Premium kits clear slowly and beautifully. Don't rush.","why_text":"Two stable readings are more reliable than one low reading.","warning_text":"Still hazy at Day 21? Give it 3 more days.","celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":true},{"id":"kit-cabernet-premium-s12","journey_id":"kit-cabernet-premium","phase_id":"kit-cabernet-premium-phase-4","step_number":12,"day_label":"Day 21","tagline":"Clean wine, clean home.","title":"Second rack — off the fining sediment","instruction":"Rack carefully into fresh sanitised carboy. Leave all sediment behind.","coach_message":"Twenty-three litres of clear Cabernet moving between carboys. You'll feel extremely competent.","why_text":"Fining sediment contains proteins, tannins, dead yeast. Removing it prevents off-flavour development.","warning_text":"Fining sediment resuspends easily — rack slowly.","celebration_text":"","timer_label":"30 min","temp_instruction":"","is_milestone":false},{"id":"kit-cabernet-premium-s13","journey_id":"kit-cabernet-premium","phase_id":"kit-cabernet-premium-phase-5","step_number":13,"day_label":"Days 28–35","tagline":"Good things happen slowly.","title":"Short conditioning","instruction":"Move to a cool spot (15–20°C). Leave undisturbed for 5–7 days. No wine fridge needed.","coach_message":"This is the step that separates a decent kit wine from a genuinely impressive one.","why_text":"Short conditioning allows tannin polymerisation and protein precipitation.","warning_text":"Below 12°C unnecessary. Above 22°C negates the benefit.","celebration_text":"","timer_label":"5–7 days","temp_instruction":"15–20°C is the target. A cool room or garage is ideal.","is_milestone":false},{"id":"kit-cabernet-premium-s14","journey_id":"kit-cabernet-premium","phase_id":"kit-cabernet-premium-phase-5","step_number":14,"day_label":"Day 35","tagline":"Final taste. Final call.","title":"Taste and adjust if needed","instruction":"Pour a proper glass. Smell, taste, assess. Most premium kit Cabs need nothing.","coach_message":"This is as close to a winery tasting as your kitchen gets.","why_text":"Premium kits are pre-balanced. Most need no adjustment.","warning_text":"Add a little. Wait 24 hours. Taste again.","celebration_text":"","timer_label":"30 min","temp_instruction":"","is_milestone":false},{"id":"kit-cabernet-premium-s15","journey_id":"kit-cabernet-premium","phase_id":"kit-cabernet-premium-phase-6","step_number":15,"day_label":"Day 35","tagline":"Thirty bottles. All of them yours.","title":"Sanitise for bottling day","instruction":"Wash all bottles (up to 30), corker, siphon. Rinse each with Campden solution. Allow 2 hours.","coach_message":"Premium kit. Premium preparation.","why_text":null,"warning_text":"Start with cleanest bottles first.","celebration_text":"","timer_label":"2 hours","temp_instruction":"Bottle at 18–22°C.","is_milestone":false},{"id":"kit-cabernet-premium-s16","journey_id":"kit-cabernet-premium","phase_id":"kit-cabernet-premium-phase-6","step_number":16,"day_label":"Day 42","tagline":"Thirty bottles. Six weeks. Real Cabernet.","title":"Bottle and apply Vintage Card","instruction":"Siphon into bottles to 2cm below cork. Cork firmly. Stand upright 24 hours. Apply Vintage Card. Rest 4 weeks minimum.","coach_message":"Thirty bottles is a wine rack.","why_text":"2cm headspace and upright-then-horizontal storage applies equally to 6 or 30 bottles.","warning_text":"Work steadily — don't leave 23L open between bottles.","celebration_text":"Thirty bottles of Cabernet Sauvignon. Vintage Card applied.","timer_label":"2–3 hours","temp_instruction":"","is_milestone":true},{"id":"kit-white-quick-s01","journey_id":"kit-white-quick","phase_id":"kit-white-quick-phase-1","step_number":1,"day_label":"Day 0","tagline":"Same first move. Always.","title":"Sanitise everything","instruction":"Sanitise carboy, airlock, bung, spoon, hydrometer tube and funnel with Campden solution. (Campden solution is one option — StarSan or iodophor are no-rinse alternatives, gentler if you're sulphite-sensitive.)","coach_message":"Three weeks, twelve steps, no shortcuts on sanitation.","why_text":"White wine is more delicate than red and more susceptible to spoilage.","warning_text":"Don't towel dry.","celebration_text":"","timer_label":"45 min","temp_instruction":"","is_milestone":false},{"id":"kit-white-quick-s02","journey_id":"kit-white-quick","phase_id":"kit-white-quick-phase-1","step_number":2,"day_label":"Day 0","tagline":"Cold water. White character. Important.","title":"Mix concentrate and take OG","instruction":"Pour concentrate into carboy. Fill to 6 litres with water at 18–20°C — cooler than red kit mixing. Stir well. Take OG (target 1.060–1.075).","coach_message":"Cold water is the first temperature decision in a white kit.","why_text":"White wine aromatics (citrus, floral) are volatile. Starting cooler preserves them from the first stir.","warning_text":"Use 18–20°C water specifically for white kits.","celebration_text":"","timer_label":"15 min","temp_instruction":"Water at 18–20°C is cooler than red kits. This is deliberate.","is_milestone":false},{"id":"kit-white-quick-s03","journey_id":"kit-white-quick","phase_id":"kit-white-quick-phase-1","step_number":3,"day_label":"Day 0","tagline":"Same day. No waiting.","title":"Pitch yeast — same day","instruction":"Sprinkle yeast on surface. Wait 15 minutes. Stir gently. Fit airlock.","coach_message":"Concentrate is sterile. Pitch the yeast. Go.","why_text":"No wild yeast risk. No 24-hour Campden wait.","warning_text":"Check temperature is 18–20°C before pitching.","celebration_text":"White wine fermentation has started. No turning back.","timer_label":"15 min","temp_instruction":"18–20°C before pitching — cooler than red.","is_milestone":true},{"id":"kit-white-quick-s04","journey_id":"kit-white-quick","phase_id":"kit-white-quick-phase-2","step_number":4,"day_label":"Days 1–3","tagline":"Cooler and quieter than a red.","title":"Watch for airlock activity","instruction":"White kit fermentation is slower than red — bubbling may start in 18–36 hours. Keep 17–21°C.","coach_message":"White kits ferment more quietly than reds.","why_text":"White wine yeasts perform best at lower temperatures. Slower fermentation preserves fresh citrus aromatics.","warning_text":"No bubbles at 48 hours? Check temperature first — white kits stall faster when cool.","celebration_text":"","timer_label":"Watch 36–48 hrs","temp_instruction":"Keep 17–21°C. Most important temperature window in the white kit journey.","is_milestone":false},{"id":"kit-white-quick-s05","journey_id":"kit-white-quick","phase_id":"kit-white-quick-phase-2","step_number":5,"day_label":"Day 3","tagline":"White yeast needs snacks too.","title":"Add yeast nutrient","instruction":"Add 1 level teaspoon yeast nutrient. Stir gently. Refit airlock.","coach_message":"Same rule, same reason, same teaspoon.","why_text":null,"warning_text":null,"celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"kit-white-quick-s06","journey_id":"kit-white-quick","phase_id":"kit-white-quick-phase-2","step_number":6,"day_label":"Day 5","tagline":"Quick drop. Good sign.","title":"Mid-ferment gravity check","instruction":"Take SG reading. Expect 1.030–1.050 by Day 5. Sniff — should smell fresh and yeasty, not sour or flat. Log temperature.","coach_message":"Quick kit whites move fast.","why_text":"Budget kit yeasts are selected for fermentation speed.","warning_text":"Sour or vinegary smell at Day 5? Open the troubleshooter.","celebration_text":"","timer_label":"","temp_instruction":"Log temperature. 17–21°C is the window.","is_milestone":false},{"id":"kit-white-quick-s07","journey_id":"kit-white-quick","phase_id":"kit-white-quick-phase-2","step_number":7,"day_label":"Day 7","tagline":"Seven days. Done.","title":"Confirm primary finished — rack","instruction":"Two gravity readings 24 hours apart. Both at or below 1.010? Primary done. Rack into clean carboy.","coach_message":"Seven days of fermentation. Primary done.","why_text":null,"warning_text":"SG stuck above 1.010? Check temperature.","celebration_text":"Primary fermentation done. That is white wine.","timer_label":"Two readings 24 hrs apart","temp_instruction":"","is_milestone":true},{"id":"kit-white-quick-s07b","journey_id":"kit-white-quick","phase_id":"kit-white-quick-phase-3","step_number":7.5,"day_label":"Day 7","tagline":"White kits fizz. Degas first.","title":"Degas — stir vigorously","instruction":"Degas before stabilising: stir vigorously for 10 minutes until CO₂ stops rising. White kit wines are especially prone to a prickly, spritzy finish if CO₂ is left in.","coach_message":"A spritzy white can be charming on purpose — but not by accident. Degas now so your finished wine is crisp, not fizzy.","why_text":"White kit wines show trapped CO₂ more obviously than reds. Degassing gives a clean, still finish.","warning_text":"Stir gently enough to avoid splashing oxygen in — white wine oxidises fast.","celebration_text":"","timer_label":"10 min","temp_instruction":"","is_milestone":false},{"id":"kit-white-quick-s08","journey_id":"kit-white-quick","phase_id":"kit-white-quick-phase-3","step_number":8,"day_label":"Day 7","tagline":"Sorbate first. Finings second.","title":"Add stabiliser + kieselsol","instruction":"Add potassium sorbate sachet. Stir. Then add kieselsol immediately. Stir vigorously 60 seconds.","coach_message":"White kit clearing is fast. Do everything on Day 7.","why_text":"White kit stabilisation and first fining can happen same day — fewer complex compounds to interact.","warning_text":"Stir thoroughly after each addition.","celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"kit-white-quick-s09","journey_id":"kit-white-quick","phase_id":"kit-white-quick-phase-3","step_number":9,"day_label":"Day 8","tagline":"Part two. The finish.","title":"Add chitosan — second fining","instruction":"Add chitosan 24 hours after kieselsol. Stir vigorously. Do not move carboy for 4–5 days.","coach_message":"White kits clear fast with two-part fining.","why_text":null,"warning_text":"Do not move carboy — any vibration delays clearing.","celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"kit-white-quick-s10","journey_id":"kit-white-quick","phase_id":"kit-white-quick-phase-3","step_number":10,"day_label":"Day 12","tagline":"Pale. Clear. Ready.","title":"Clarity and final gravity check","instruction":"Hold carboy to phone torch — looking for pale straw-yellow, completely clear, with sediment at bottom. Take final gravity (target 0.990–0.998).","coach_message":"Clear pale white wine by Day 12.","why_text":null,"warning_text":"Still hazy? Give it 2 more days.","celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"kit-white-quick-s11","journey_id":"kit-white-quick","phase_id":"kit-white-quick-phase-4","step_number":11,"day_label":"Day 14","tagline":"Bottle young. Drink younger.","title":"Sanitise and bottle","instruction":"Sanitise six bottles, corker, siphon. Rack wine into bottles to 2cm below cork line. Cork firmly.","coach_message":"Quick kit white is designed to be drunk young.","why_text":"Fresh citrus and floral character are at their best in the first 3–6 months.","warning_text":"Work steadily — white wine oxidises faster if left open.","celebration_text":"Bottled in two weeks. White wine from your kitchen.","timer_label":"1–2 hours","temp_instruction":"","is_milestone":false},{"id":"kit-white-quick-s12","journey_id":"kit-white-quick","phase_id":"kit-white-quick-phase-4","step_number":12,"day_label":"Day 21+","tagline":"Two weeks. That is all.","title":"Wait 2 weeks. Open the first bottle.","instruction":"Rest for 2 weeks minimum. Chill well before serving (8–12°C). Pour into a proper glass. Smell the citrus.","coach_message":"Two weeks to drinkable white wine.","why_text":"Bottle shock in white wine is brief — 2 weeks is sufficient for quick kit.","warning_text":"Quick kit whites decline after 6 months. Drink fresh.","celebration_text":"You made white wine in three weeks. Tell everyone.","timer_label":"2 weeks","temp_instruction":"","is_milestone":true},{"id":"lo-fi-rose-step-01","journey_id":"lo-fi-rose","phase_id":"lo-fi-rose-phase-1","step_number":1,"day_label":"Day 0","tagline":"No clean, no pink.","title":"Sanitise everything","instruction":"Sanitise fermenter, airlock, bung, spoon, hydrometer tube and funnel. Campden solution — one tablet in 500ml cold water. Let drip-dry. (Campden solution is one option — StarSan or iodophor are no-rinse alternatives, gentler if you're sulphite-sensitive.)","coach_message":"Clean gear is the same rule whether the wine is red, white, or pink.","why_text":"Wild bacteria cause off-notes in delicate rosé faster than in red.","warning_text":"Don't towel dry.","celebration_text":"","timer_label":"45 min","temp_instruction":"","is_milestone":false},{"id":"lo-fi-rose-step-02","journey_id":"lo-fi-rose","phase_id":"lo-fi-rose-phase-1","step_number":2,"day_label":"Day 0","tagline":"The truth stick, but make it rosé.","title":"Take original gravity","instruction":"Fill hydrometer tube ¾. Float. Read at eye level. Record OG. Target 1.075–1.085.","coach_message":"The same truth stick. The same maths. The same ABV.","why_text":"OG anchors the ABV calculation.","warning_text":"Read at eye level.","celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"lo-fi-rose-step-03","journey_id":"lo-fi-rose","phase_id":"lo-fi-rose-phase-1","step_number":3,"day_label":"Day 0","tagline":"Clear the room. Pink needs a clean start.","title":"Add Campden tablet","instruction":"One Campden tablet in warm water. Stir into juice. Cover. Wait 24 hours.","coach_message":"Wild yeast makes thin, flat rosé. Yours makes structured, fruity rosé.","why_text":"Sulphite neutralises wild yeast.","warning_text":"Wait the full 24 hours.","celebration_text":"","timer_label":"24 hours","temp_instruction":"","is_milestone":false},{"id":"lo-fi-rose-step-04","journey_id":"lo-fi-rose","phase_id":"lo-fi-rose-phase-1","step_number":4,"day_label":"Day 0","tagline":"Haze prevention. Start early.","title":"Add pectic enzyme","instruction":"Add ½ tsp pectic enzyme with Campden. Same 24-hour clock.","coach_message":"No enzyme now = mysterious pink haze later.","why_text":"Pectic enzyme is more important in rosé and white than red.","warning_text":null,"celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"lo-fi-rose-step-05","journey_id":"lo-fi-rose","phase_id":"lo-fi-rose-phase-2","step_number":5,"day_label":"Day 1","tagline":"Tiny workers, pink ambitions.","title":"Pitch the yeast","instruction":"Check temperature is 18–20°C. Sprinkle yeast. Wait 15 min. Stir gently. Fit airlock.","coach_message":"Cooler pitch than a red. This preserves fresh fruit character.","why_text":"Rosé yeast performs best at 18–20°C. Warmer and you trade strawberry for jam.","warning_text":"Do not pitch above 22°C.","celebration_text":"Primary started. The pink is fermenting.","timer_label":"15 min","temp_instruction":"Must be 18–20°C — cooler than red.","is_milestone":true},{"id":"lo-fi-rose-step-06","journey_id":"lo-fi-rose","phase_id":"lo-fi-rose-phase-2","step_number":6,"day_label":"Days 2–3","tagline":"Pink bubbles. Promising.","title":"Watch for airlock activity","instruction":"Check airlock. Rosé ferments slightly slower at cooler temperature. Expect bubbles in 12–48 hours.","coach_message":"Slower bubbling than a red is normal and correct.","why_text":"Cooler fermentation — the trade-off for fresh fruit preservation.","warning_text":"No bubbles at 48 hours? Check temperature — below 16°C stalls rosé.","celebratio cted.","title":"Pitch the yeast","instruction":"Check temperature is 16–18°C. Cooler than a red. Sprinkle yeast. Wait 15 min. Stir gently. Fit airlock.","coach_message":"Cold pitch. White character protected from the first stir.","why_text":"White wine yeasts at 16–18°C produce more esters, fewer fusel alcohols.","warning_text":"Do not pitch above 20°C.","celebration_text":"White fermentation started. Keep it cold.","timer_label":"15 min","temp_instruction":"Juice must be 16–18°C — cooler than any red journey.","is_milestone":true},{"id":"apartment-white-step-06","journey_id":"apartment-white","phase_id":"apartment-white-phase-2","step_number":6,"day_label":"Days 2–3","tagline":"Quiet bubbles. Good sign.","title":"Watch for airlock activity","instruction":"White fermentation is slower and quieter. Expect first bubbles in 24–48 hours.","coach_message":"Quiet bubbling is correct for white.","why_text":"Slow, cool fermentation preserves fresh citrus aromatics.","warning_text":"No bubbles at 48 hours? Check temperature — 16°C is the minimum.","celebration_text":"","timer_label":"Watch 48 hrs","temp_instruction":"KEEP 16–20°C. Critical window. Above 22°C loses aromatics permanently.","is_milestone":false},{"id":"apartment-white-step-07","journey_id":"apartment-white","phase_id":"apartment-white-phase-2","step_number":7,"day_label":"Day 3","tagline":"Feed the white workers — carefully.","title":"Add yeast nutrient","instruction":"Add 1 level tsp yeast nutrient. Stir very gently. Refit airlock.","coach_message":"Same nutrient, same teaspoon, gentler stir.","why_text":"Equally important in white. Gentler stirring required.","warning_text":"Stir very gently — white oxidises faster.","celebration_text":"","timer_label":"","temp_instruction":"Keep 16–20°C.","is_milestone":false},{"id":"apartment-white-step-08","journey_id":"apartment-white","phase_id":"apartment-white-phase-2","step_number":8,"day_label":"Day 7","tagline":"First check on the white.","title":"Mid-ferment gravity reading","instruction":"Take gravity and temperature. Expect SG 1.030–1.050. Smell — crisp, clean, citrus-yeasty.","coach_message":"Pale, cloudy, citrusy. Exactly right.","why_text":"White gravity drops faster — lower OG and faster yeast activity.","warning_text":"Sanitise the wine thief.","celebration_text":"","timer_label":"","temp_instruction":"Log temperature. 16–20°C is the window.","is_milestone":false},{"id":"apartment-white-step-09","journey_id":"apartment-white","phase_id":"apartment-white-phase-2","step_number":9,"day_label":"Day 14","tagline":"Primary done. Rack immediately.","title":"Confirm primary and rack","instruction":"Two readings 24 hours apart. Both at or below 1.010? Rack immediately — very gentle, no splashing.","coach_message":"White primary done. Rack immediately.","why_text":"White wine oxidises rapidly during racking. Zero splash essential.","warning_text":"Rack before anything else. No delays.","celebration_text":"Primary done. The white juice is now white wine.","timer_label":"Two readings 24 hrs apart","temp_instruction":"Log temperature.","is_milestone":true},{"id":"apartment-white-step-10","journey_id":"apartment-white","phase_id":"apartment-white-phase-3","step_number":10,"day_label":"Day 15","tagline":"Top up. White hates air.","title":"Top up immediately","instruction":"Top up to within 2–3cm of bung with similar white juice or water.","coach_message":"White wine and oxygen are not friends.","why_text":"Low phenolics = little natural antioxidant protection.","warning_text":"Top up immediately after racking.","celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"apartment-white-step-11","journey_id":"apartment-white","phase_id":"apartment-white-phase-4","step_number":11,"day_label":"Day 20","tagline":"Protect and settle.","title":"Add Campden and fining agent","instruction":"Add Campden tablet (dissolved in cold water). Then add bentonite (¼ tsp warm water). Stir gently. Do not move 7 days.","coach_message":"Protection and clearing in one step.","why_text":"Campden protects from oxidation; bentonite removes protein haze.","warning_text":"Stir gently — vigorous stirring oxidises white wine.","celebration_text":"","timer_label":"7 days","temp_instruction":"","is_milestone":false},{"id":"apartment-white-step-12","journey_id":"apartment-white","phase_id":"apartment-white-phase-4","step_number":12,"day_label":"Day 27","tagline":"Crystal clear. Pale gold.","title":"Clarity check","instruction":"Hold to phone torch. Pale straw, crystal clear, sediment at bottom.","coach_message":"Crystal clear white wine at Day 27.","why_text":"White clarity is more visible than in red.","warning_text":"Still hazy at Day 30? Add second fining.","celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"apartment-white-step-13","journey_id":"apartment-white","phase_id":"apartment-white-phase-4","step_number":13,"day_label":"Day 29","tagline":"Final rack. Handle with care.","title":"Second rack — very gently","instruction":"Rack off fining sediment into fresh sanitised carboy.","coach_message":"White wine is at its most fragile here.","why_text":"No CO₂ protection, no high tannin — oxygen is the enemy.","warning_text":"Rack as slowly as possible. No splashing.","celebration_text":"","timer_label":"30 min","temp_instruction":"","is_milestone":false},{"id":"apartment-white-step-14","journey_id":"apartment-white","phase_id":"apartment-white-phase-5","step_number":14,"day_label":"Days 33–38","tagline":"Stabilise and protect.","title":"Final stabilisation","instruction":"Add one final Campden tablet in cold water. Stir very gently.","coach_message":"Last protection before the bottles.","why_text":"Final sulphite ensures protection through bottling.","warning_text":"Stir gently — white oxidises at every stir.","celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"apartment-white-step-15","journey_id":"apartment-white","phase_id":"apartment-white-phase-6","step_number":15,"day_label":"Day 39","tagline":"Sanitise. Bottle. Fridge.","title":"Sanitise and bottle","instruction":"Sanitise 6 bottles, corker, siphon. Rack into bottles. Move to fridge within 24 hours.","coach_message":"White wine goes from bottle to fridge.","why_text":"White stored at room temperature ages rapidly in Singapore's heat.","warning_text":"Move to fridge within 24 hours.","celebration_text":"","timer_label":"1–2 hours","temp_instruction":"Bottle at 18–22°C.","is_milestone":false},{"id":"apartment-white-step-16","journey_id":"apartment-white","phase_id":"apartment-white-phase-6","step_number":16,"day_label":"Day 45+","tagline":"Cold. Fresh. Yours.","title":"Apply Vintage Card and wait","instruction":"Apply Vintage Card. Store at 8–12°C. Wait 2–3 weeks minimum.","coach_message":"Pale, crisp, fresh, cold. Your Apartment White.","why_text":"Bottle shock brief — 2 weeks is sufficient.","warning_text":"Drink within 6–9 months.","celebration_text":"You made white wine in your apartment. Cold, fresh, and yours.","timer_label":"2–3 weeks","temp_instruction":"","is_milestone":true}],"ingredients":[{"journey_id":"beginners-shiraz","sort_order":1,"name":"Shiraz grape juice","quantity":"6 litres","unit":"litres","description":"The whole point of this exercise.","cheeky_note":"Preservative-free. The whole point.","essential":true,"buy_link":""},{"journey_id":"beginners-shiraz","sort_order":2,"name":"Wine yeast ","quantity":1,"unit":"sachet","description":"EC-1118 or Lalvin 71B. The organism that converts sugar into alcohol. The actual magic.","cheeky_note":"Not bread yeast. Never bread yeast.","essential":true,"buy_link":"https://ibrewsg.com/yeast"},{"journey_id":"beginners-shiraz","sort_order":3,"name":"Campden tablets","quantity":3,"unit":"tablets","description":"Sodium metabisulphite. Sanitises, protects, and stabilises at three different stages of the journey.","cheeky_note":"The bouncer at the door. And the lock on it.","e :true,"buy_link":""},{"journey_id":"beginners-shiraz","sort_order":3,"name":"Hydrometer + tube","quantity":1,"description":"Measures the sugar content of your juice to calculate starting gravity and final ABV.","cheeky_note":"Tells the truth when bubbles lie.","essential":true,"buy_link":""},{"journey_id":"beginners-shiraz","sort_order":4,"name":"Siphon","quantity":1,"description":"Transfers wine between carboys without disturbing the sediment. Auto-siphon strongly recommended.","cheeky_note":"Moves wine without stirring the drama.","essential":true,"buy_link":""},{"journey_id":"beginners-shiraz","sort_order":5,"name":"Wine thief or turkey baster","quantity":1,"description":"For drawing small samples to measure gravity or taste — without contaminating the whole batch.","cheeky_note":"Steals a little for science. Worth it.","essential":true,"buy_link":""},{"journey_id":"beginners-shiraz","sort_order":6,"name":"Long-handled stainless spoon","quantity":1,"description":"For stirring ingredients into the juice. Stainless steel only — wooden spoons harbour bacteria.","cheeky_note":"Wooden spoons harbour bacteria. Steel only.","essential":true,"buy_link":""},{"journey_id":"beginners-shiraz","sort_order":7,"name":"Wine bottles (750ml dark)","quantity":6,"description":"Dark glass protects wine from light damage during bottle conditioning. Clean, dry, ready.","cheeky_note":"The destination. Six of them.","essential":true,"buy_link":""},{"journey_id":"beginners-shiraz","sort_order":8,"name":"Corks + hand corker ","quantity":"1 set","description":"Natural or synthetic corks with a basic hand corker. Handles 6 bottles cleanly.","cheeky_note":"The final seal on something worth sealing.","essential":true,"buy_link":""},{"journey_id":"beginners-shiraz","sort_order":9,"name":"Funnel","quantity":1,"description":"Helps fill bottles cleanly without splashing. Sanitise it along with everything else.","cheeky_note":"Optional. Until it isn't.","essential":false,"buy_link":""},{"journey_id const $ = (s) => document.querySelector(s);
const app = document.getElementById('app');

const state = {
  screen:'welcome', selected: DATA.journeys[0]?.id || '',
  batch:null, currentStep:0, log:[], toast:'',
  kit:{},            // Enhancement 4: kit checklist state
  celebrating:false, // Enhancement 5: celebration overlay
  celebText:'',
  nextAction:'',
  modal:null,        // Enhancement 3: in-app modal (replaces alert)
};

// Load persisted state
try {
  const saved = JSON.parse(localStorage.getItem('glugplonk_state') || '{}');
  Object.assign(state, saved);
  if (!state.kit) state.kit = {};
} catch(e){}

function save(){
  localStorage.setItem('glugplonk_state', JSON.stringify({
    screen:state.screen, selected:state.selected, batch:state.batch,
    currentStep:state.currentStep, log:state.log, kit:state.kit
  }));
}

function esc(x){ return String(x ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'>',"\"":'"',"'":'&#39;'}[m])); }
function journey(id=state.selected){ return DATA.journeys.find(j=>j.id===id) || DATA.journeys[0]; }
function steps(id=state.selected){ return DATA.steps.filter(s=>s.journey_id===id).sort((a,b)=>Number(a.step_number)-Number(b.step_number)); }
function phases(id=state.selected){ return DATA.phases.filter(p=>p.journey_id===id).sort((a,b)=>Number(a.phase_number)-Number(b.phase_number)); }
function phaseForStep(st){ return DATA.phases.find(p=>p.id===st?.phase_id) || {name:'Journey',label:'Journey',color_hex:'#641032'}; }
function ingredients(id=state.selected){ return DATA.ingredients.filter(x=>x.journey_id===id).sort((a,b)=>a.sort_order-b.sort_order); }
function equipment(id=state.selected){ return DATA.equipment.filter(x=>x.journey_id===id).sort((a,b)=>a.sort_order-b.sort_order); }

function go(screen){ state.screen=screen; save(); render(); }
function selectJourney(id){ state.selected=id; state.currentStep=0; go('overview'); }

// Enhancement 6: + nav wires to log
function navPlus(){ go('log'); }

function resetApp(){
  localStorage.removeItem('glugplonk_state');
  state.screen='welcome'; state.selected=DATA.journeys[0]?.id||'';
  state.batch=null; state.currentStep=0; state.log=[]; state.kit={};
  state.celebrating=false; state.modal=null;
  render();
}

function toast(msg){ state.toast=msg; render(); setTimeout(()=>{ state.toast=''; render(); },1800); }

// Enhancement 3: In-app modal (replaces alert)
function showModal(title, body){
  state.modal = {title, body};
  render();
}
function closeModal(){ state.modal=null; render(); }

// Enhancement 3: Show issue in modal instead of alert
function showIssue(i){
  const x = DATA.issues[i];
  showModal(x.symptom, `
    <div style="margin-bottom:14px">
      <div class="kicker" style="margin-bottom:6px">Likely cause</div>
      <p class="p">${esc(x.likely_cause)}</p>
    </div>
    <div class="card" style="margin-bottom:14px;background:var(--paper)">
      <div class="kicker" style="margin-bottom:6px">Do this</div>
      <p class="p">${esc(x.user_action)}</p>
    </div>
    <div style="margin-bottom:6px">
      <div class="kicker" style="margin-bottom:6px;color:var(--warn)">When to panic</div>
      <p class="p" style="color:var(--warn)">${esc(x.when_to_panic || 'Only if it gets worse.')}</p>
    </div>
    <div class="card" style="background:var(--wine);border:0;text-align:center;padding:12px;margin-top:14px">
      <p class="script" style="color:white;font-size:17px;font-weight:900">"${esc(x.coach_copy)}"</p>
    </div>
  `);
}

// Enhancement 5: Milestone check
function isMilestone(step){
  return step && step.celebration_text && step.celebration_text.trim().length > 0;
}

// Enhancement 1: Save inline log from task screen
function saveInlineLog(){
  const sg = document.getElementById('inline-sg')?.value?.trim();
  const temp = document.getElementById('inline-temp')?.value?.trim();
  const notes = document.getElementById('inline-notes')?.value?.trim();
  if (!sg && !temp && !notes) return;
  const st = steps(state.selected);
  const cur = st[Math.min(state.currentStep, st.length-1)];
  const isFG = cur?.title?.toLowerCase().includes('final gravity') || cur?.title?.toLowerCase().includes('abv');
  if (isFG && sg && state.batch) {
    state.batch.fg = parseFloat(sg); // Enhancement 2: store FG for ABV
  }
  state.log.push({ sg:sg||null, temp:temp||null, notes:notes||null, step:state.currentStep, stepTitle:cur?.title||'', date:new Date().toLocaleDateString('en-SG') });
  save();
}

// Enhancement 5: Complete step with celebration check
function completeStep(){
  const st = steps(state.selected);
  const cur = st[Math.min(state.currentStep, st.length-1)] || {};
  saveInlineLog();
  if (state.currentStep >= st.length-1){
    if (isMilestone(cur)){ state.celebrating=true; state.celebText=cur.celebration_text; state.nextAction='vintage'; render(); }
    else { go('vintage'); }
    return;
  }
  if (isMilestone(cur)){
    state.celebrating=true; state.celebText=cur.celebration_text; state.nextAction='next'; render();
  } else {
    state.currentStep++; save(); toast('Done. The yeast approves.');
  }
}

// Enhancement 5: Dismiss celebration overlay
function dismissCelebration(){
  state.celebrating=false;
  if (state.nextAction==='vintage'){ go('vintage'); }
  else { state.currentStep++; save(); render(); }
}

// Enhancement 4: Toggle kit item
function toggleKit(itemId){
  state.kit[itemId] = !state.kit[itemId];
  save(); render();
}

// Enhancement 4: Check all essential kit items
function checkAllKit(){
  const j = journey();
  ingredients(j.id).filter(x=>x.essential).forEach(x=>{ state.kit[j.id+'_i'+x.sort_order]=true; });
  equipment(j.id).filter(x=>x.essential).forEach(x=>{ state.kit[j.id+'_e'+x.sort_order]=true; });
  save(); render();
}

function createBatch(){
  state.batch={
    name:$('#batchName').value.trim()||'Untitled Plonk',
    winery:$('#wineryName').value.trim()||'Garage Plonk',
    date:$('#startDate').value,
    og:$('#og').value.trim(),
    journey_id:state.selected
  };
  state.currentStep=0; state.log=[]; go('dashboard');
}

function saveReading(){
  const sg=$('#sg').value.trim(), temp=$('#temp').value.trim(), notes=$('#notes').value.trim();
  if (!sg && !temp && !notes){ toast('Add at least one value.'); return; }
  state.log.push({ sg, temp, notes, step:state.currentStep, stepTitle:'Manual entry', date:new Date().toLocaleDateString('en-SG') });
  save(); toast('Logged. Legend preserved.');
}

// ─── Shell and nav ─────────────────────────────────────────────────────────
function shell(content, nav=true){
  const modal = state.modal ? `
    <div class="modal-overlay" onclick="closeModal()">
      <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="between" style="margin-bottom:16px">
          <div class="h2" style="font-size:22px;margin:0">${esc(state.modal.title)}</div>
          <button onclick="closeModal()" style="border:0;background:transparent;font-size:26px;color:var(--muted);line-height:1;padding:0">×</button>
        </div>
        ${state.modal.body}
        <button class="btn" style="width:100%;margin-top:16px" onclick="closeModal()">Got it</button>
      </div>
    </div>` : '';

  const celeb = state.celebrating ? `
    <div class="celeb-overlay">
      <div style="font-size:72px;margin-bottom:20px;animation:celebPulse 1.4s ease infinite">🍷</div>
      <div class="h1" style="color:white;font-size:40px;margin-bottom:12px">Yes.</div>
      <p style="font-family:'Caveat','Comic Sans MS',cursive;color:#fffde8;font-size:22px;line-height:1.5;margin:0 auto 28px;max-width:300px;font-weight:900">"${esc(state.celebText)}"</p>
      <div class="stamp" style="border-color:white;color:white;margin-bottom:32px">Milestone unlocked</div>
      <button class="btn lime" style="font-size:16px;padding:16px 40px" onclick="dismissCelebration()">Keep going →</button>
    </div>` : '';

  app.innerHTML = `
    <div class="app-shell">
      <main class="main fade">${content}</main>
      ${nav ? navHtml() : ''}
      ${state.toast ? `<div class="toast">${esc(state.toast)}</div>` : ''}
    </div>
    ${modal}
    ${celeb}`;
}

function topbar(title, sub=''){ return `<div class="between" style="margin-bottom:18px"><div><div class="kicker">${esc(sub||'Private Batch')}</div><div class="h2">${esc(title)}</div></div><div class="icon"><span style="position:relative;z-index:1">Gp</span><span style="position:absolute;left:-6px;bottom:-8px;width:52px;height:18px;border-radius:50%;background:#ef5576;opacity:.7"></span></div></div>`; }

function navHtml(){
  const tabs=[
    ['dashboard','🍷','Batch'],
    ['journeys','🧭','Journey'],
    ['log','+',''],       // Enhancement 6: + wired to log
    ['log','📈','Log'],
    ['help','⚡','Help']
  ];
  return `<nav class="nav">${tabs.map(([id,ic,lab])=>`<button onclick="go('${id}')" class="${state.screen===id?'active':''} ${!lab?'plus':''}">${ic}${lab?`<span>${lab}</span>`:''}</button>`).join('')}</nav>`;
}

function render(){

// Speakeasy interactions
let _spKnocks=0, _spPoison=null;
function spKnock(){
  _spKnocks++;
  const el=document.getElementById('sp-knock');
  if(_spKnocks<3){ el.textContent='*knock* '.repeat(_spKnocks).trim()+'   ('+(3-_spKnocks)+' to go)'; }
  else {
    el.textContent='*the latch slides open*';
    setTimeout(()=>{
      document.getElementById('sp0').classList.remove('on');
      document.getElementById('sp1').classList.add('on');
    },420);
  }
}
function spPick(el,val){
  _spPoison=val;
  document.querySelectorAll('#sp-poison .speak-pill').forEach(p=>p.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('sp-enter').classList.add('ready');
}
// Map a poison choice to a real journey id
function _poisonToJourney(p){
  const map={ red:'beginners-shiraz', white:'apartment-white', rose:'lo-fi-rose' };
  if(p==='surprise'){ return DATA.journeys[Math.floor(Math.random()*DATA.journeys.length)].id; }
  return map[p] || DATA.journeys[0].id;
}
function spEnter(){
  if(!_spPoison) return;
  const msg={ red:"A serious red it is. The Cabernet's been waiting.",
    white:"Cold and bright. Fridge-door material.",
    rose:"Pink chaos, coming right up.",
    surprise:"Barkeep's choice. Bold move. We respect it." }[_spPoison]||"Your table's ready.";
  const welc=document.getElementById('sp-welcome');
  if(welc) welc.textContent=msg;
  document.getElementById('sp1').classList.remove('on');
  document.getElementById('sp2').classList.add('on');
  const target=_poisonToJourney(_spPoison);
  // After the welcome beat, route into the chosen journey (or dashboard if returning)
  setTimeout(()=>{
    if(state.batch){ go('dashboard'); }
    else { state.selected=target; go('overview'); }
  },1700);
}
function spStraightIn(){
  if(state.batch){ go('dashboard'); } else { go('journeys'); }
}

// Days-alive: how many days since the batch start date
function batchDaysAlive(){
  if(!state.batch?.date) return null;
  const start=new Date(state.batch.date);
  if(isNaN(start)) return null;
  const now=new Date();
  // Zero out time so it's a clean day count
  const ms=new Date(now.getFullYear(),now.getMonth(),now.getDate())
          - new Date(start.getFullYear(),start.getMonth(),start.getDate());
  const d=Math.floor(ms/86400000);
  return d<0?0:d;
}
// A reassuring, on-brand status line based on how far along the batch is
function daysAliveLine(days, total, st, cur){
  if(days===null) return '';
  const done = state.currentStep>=st.length-1;
  if(done) return 'Bottled and glorious. Open one when you can bear to.';
  if(days===0) return 'Day zero. The adventure begins.';
  const frac = total?days/total:0;
  if(frac<0.05) return "Early days. Don't poke the bucket for emotional support.";
  if(frac<0.3)  return 'Fermenting nicely. Your yeast is working the night shift.';
  if(frac<0.6)  return 'Hitting its stride. Quiet, but very much alive.';
  if(frac<0.85) return 'Almost there. The hard part is the waiting.';
  if(frac<1)    return 'So close. Resist the urge to bottle early.';
  return 'Past schedule — but wine keeps its own time. Check on it.';
}

// Enhancement 2: Live ABV calculation hint
function liveAbv(val){
  const fg=parseFloat(val), og=parseFloat(state.batch?.og);
  const hint=document.getElementById('abv-hint');
  const num=document.getElementById('abv-num');
  if(hint&&num&&fg&&og&&fg<og&&fg<1.05){
    const abv=((og-fg)*131.25).toFixed(1);
    num.textContent=abv+'%';
    hint.style.display='block';
  } else if(hint){ hint.style.display='none'; }
}

// Live temperature status
function liveTempCheck(val){
  const t=parseFloat(val);
  const hint=document.getElementById('temp-hint');
  if(!hint||!t) return;
  if(t<18){ hint.style.display='block'; hint.style.background='#e8f0ff'; hint.style.color='#2d2d8f'; hint.textContent='❄️ Too cold — warm up the space'; }
  else if(t>26){ hint.style.display='block'; hint.style.background='#fff0ef'; hint.style.color='var(--warn)'; hint.textContent='🔥 Too warm — move to a cooler spot'; }
  else { hint.style.display='block'; hint.style.background='#edfff4'; hint.style.color='var(--good)'; hint.textContent='✓ Temperature is perfect'; }
}

// Enhancement 4: Kit screen with checkboxes
function kit(){
  const j=journey();
  const ings=ingredients(j.id);
  const equip=equipment(j.id);
  const cIng=ings.filter(x=>!!state.kit[j.id+'_i'+x.sort_order]).length;
  const cEq=equip.filter(x=>!!state.kit[j.id+'_e'+x.sort_order]).length;
  const total=ings.length+equip.length;
  const checked=cIng+cEq;
  const essTotal=ings.filter(x=>x.essential).length+equip.filter(x=>x.essential).length;
  const essChecked=ings.filter(x=>x.essential&&state.kit[j.id+'_i'+x.sort_order]).length+equip.filter(x=>x.essential&&state.kit[j.id+'_e'+x.sort_order]).length;
  const allEss=essChecked===essTotal;

  function row(x, id){
    const ck=!!state.kit[id];
    return `<button class="kit-row" onclick="toggleKit('${id}')">
      <div class="kit-check ${ck?'on':''}">${ck?'✓':''}</div>
      <div style="flex:1;text-align:left">
        <div style="font-weight:700;font-size:14px;color:${ck?'var(--muted)':'var(--ink)'};text-decoration:${ck?'line-through':'none'};transition:all .15s">${esc(x.name)}${!x.essential?` <span style="font-size:10px;font-weight:800;color:var(--muted);background:var(--paper);border-radius:6px;padding:2px 5px;vertical-align:middle">OPTIONAL</span>`:''}</div>
        <div class="small" style="margin-top:2px">${esc(x.cheeky_note||x.description)}</div>
      </div>
      <span class="tag" style="flex-shrink:0">${esc([x.quantity,x.unit].filter(Boolean).join(' '))}</span>
    </button>`;
  }

  shell(`${topbar('Gather your kit','Ingredients & tools')}
    <!-- Progress -->
    <div class="card" style="margin-bottom:14px;text-align:center">
      <div class="between" style="margin-bottom:10px">
        <div class="kicker">Ready for ${esc(j.name)}</div>
        <span class="tag">${checked} / ${total} items</span>
      </div>
      <div class="progress" style="margin-bottom:10px"><i style="width:${total?Math.round(checked/total*100):0}%"></i></div>
      <div style="display:flex;gap:10px">
        <button class="btn alt" style="flex:1;padding:10px;font-size:12px" onclick="checkAllKit()">Check all essentials</button>
        ${allEss ? `<div class="stamp">Ready to start! 🍷</div>` : `<span class="small" style="align-self:center">${essChecked}/${essTotal} essentials</span>`}
      </div>
    </div>
    <!-- Ingredients -->
    <div class="card" style="margin-bottom:14px">
      <div class="between" style="margin-bottom:2px">
        <div class="kicker">Ingredients</div>
        <span class="tag">${cIng}/${ings.length}</span>
      </div>
      ${ings.map(x=>row(x, j.id+'_i'+x.sort_order)).join('')}
    </div>
    <!-- Equipment -->
    <div class="card">
      <div class="between" style="margin-bottom:2px">
        <div class="kicker">Equipment</div>
        <span class="tag">${cEq}/${equip.length}</span>
      </div>
      ${equip.map(x=>row(x, j.id+'_e'+x.sort_order)).join('')}
    </div>`);
}

    ${abv?`<div class="card" style="background:var(--wine);border:0;margin-bottom:14px;text-align:center">
      <div class="kicker" style="color:#fff9">Calculated ABV</div>
      <div style="font-family:Georgia,serif;font-size:36px;font-weight:800;color:white;margin:4px 0">${abv}%</div>
      <div class="stamp" style="border-color:white;color:white">Certified gluggable</div>
    </div>`:''}
    <div class="card" style="margin-bottom:14px">
      <label class="kicker">Gravity</label>
      <input id="sg" class="field mono" placeholder="1.070" inputmode="decimal" value="${esc(last.sg||'')}" style="margin:7px 0 12px">
      <label class="kicker">Temperature °C</label>
      <input id="temp" class="field mono" placeholder="22" inputmode="decimal" value="${esc(last.temp||'')}" style="margin:7px 0 12px">
      <label class="kicker">Notes</label>
      <input id="notes" class="field" placeholder="Smells like berries and bad decisions" value="${esc(last.notes||'')}" style="margin-top:7px">
      <button class="btn lime" style="width:100%;margin-top:14px" onclick="saveReading()">Save reading</button>
    </div>
    <div style="display:grid;gap:10px">
      ${state.log.length?state.log.slice().reverse().map(r=>`
        <div class="card">
          <div class="between">
            <b class="mono" style="font-size:16px">SG ${esc(r.sg||'—')}</b>
            <span class="small">${esc(r.date)}</span>
          </div>
          <div class="small" style="margin-top:4px">${r.temp?esc(r.temp)+'°C · ':''}${esc(r.notes||'No notes.')}</div>
          ${r.stepTitle?`<div class="tag" style="margin-top:6px">${esc(r.stepTitle)}</div>`:''}
        </div>`).join(''):`<div class="card small" style="text-align:center;padding:24px">No readings yet.<br>Your wine is still mysterious.</div>`}
    </div>`);
}

function help(){
  shell(`${topbar('Is my wine dying?','Troubleshooting')}
    <div class="card" style="margin-bottom:14px;background:#fff8e5">
      <p class="p"><b>Probably not.</b> Wine is dramatic. Check the symptoms below, take a gravity reading, and do not panic-stir.</p>
    </div>
    <div style="display:grid;gap:10px">
      ${DATA.issues.map((x,i)=>`
        <button class="issue" onclick="showIssue(${i})">
          <div class="between">
            <b>${esc(x.symptom)}</b>
            <span class="tag" style="${x.severity==='High'?'border-color:var(--warn);color:var(--warn)':''}">${esc(x.severity)}</span>
          </div>
          <div class="small" style="margin-top:6px">${esc(x.coach_copy||x.likely_cause)}</div>
        </button>`).join('')}
    </div>`);
}

// Enhancement 7: ABV on Vintage Card
function vintage(){
  const j=journey(state.batch?.journey_id||state.selected);
  const last=state.log.slice(-1)[0]||{};
  const yr=new Date(state.batch?.date||Date.now()).getFullYear();
  const og=parseFloat(state.batch?.og), fg=parseFloat(state.batch?.fg);
  const abv=(og&&fg)?((og-fg)*131.25).toFixed(1):null;
  const logWithSg=state.log.slice().reverse().find(r=>r.sg&&parseFloat(r.sg)<1.05);
  const computedAbv=abv||(og&&logWithSg?((og-parseFloat(logWithSg.sg))*131.25).toFixed(1):null);

  shell(`<div style="min-height:100%;display:flex;flex-direction:column;justify-content:center;text-align:center">
    <div class="card" style="background:var(--wine);color:white;border:0;padding:28px 20px;margin-bottom:18px">
      <div class="kicker" style="color:#fff9">Vintage ${yr}</div>
      <div class="brand" style="font-size:44px;margin:12px 0;color:white">${esc(state.batch?.name||'Tiny Rebel')}</div>
      <p style="margin:0 auto 18px;line-height:1.55;color:#fffde8;max-width:280px">${esc(state.batch?.winery||'Garage Plonk')} · ${esc(j.name)}</p>
      ${computedAbv?`
        <div style="background:#ffffff22;border-radius:14px;padding:14px;margin-bottom:18px">
          <div class="kicker" style="color:#fff9;margin-bottom:4px">Alcohol by Volume</div>
          <div style="font-family:Georgia,serif;font-size:42px;font-weight:800;color:white;line-height:1">${computedAbv}%</div>
          <div class="small" style="color:#fff9;margin-top:4px">${og?'OG '+og.toFixed(3):''}${og&&(fg||logWithSg)?' → FG '+(fg||(logWithSg?parseFloat(logWithSg.sg):'?')).toFixed(3):''}   </div>
        </div>`:`<div class="small" style="color:#fff9;margin-bottom:18px">Add an OG at batch start + FG reading to unlock ABV</div>`}
      <div class="stamp" style="border-color:white;color:white">Certified gluggable</div>
      ${j.shareable_quote?`<div class="script" style="color:#fffde8;font-size:19px;margin-top:16px;line-height:1.4">"${esc(j.shareable_quote)}"</div>`:''}
    </div>
    <div class="grid2" style="margin-bottom:18px">
      <div class="card"><div class="kicker">Wine</div><b>${esc(j.name)}</b></div>
      <div class="card"><div class="kicker">Bottles</div><b>6 × 750ml</b></div>
    </div>
    ${state.log.slice(-3).reverse().map(r=>`
      <div class="card" style="margin-bottom:10px;text-align:left">
        <div class="between">
          <b class="mono">${esc(r.sg?'SG '+r.sg:'Entry')}</b>
          <span class="small">${esc(r.date)}</span>
        </div>
        <div class="small">${esc(r.notes||'No notes.')}</div>
      </div>`).join('')}
    <button class="btn" style="width:100%;margin-top:4px" onclick="resetApp()">Start another batch</button>
  </div>`);
}

window.go=go; window.selectJourney=selectJourney; window.createBatch=createBatch;
window.completeStep=completeStep; window.dismissCelebration=dismissCelebration;
window.saveReading=saveReading; window.showIssue=showIssue; window.closeModal=closeModal;
window.resetApp=resetApp; window.toggleKit=toggleKit; window.checkAllKit=checkAllKit;
window.liveAbv=liveAbv; window.liveTempCheck=liveTempCheck;
window.spKnock=spKnock; window.spPick=spPick; window.spEnter=spEnter; window.spStraightIn=spStraightIn;
render();
</script>
</body>
</html>
