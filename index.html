// LOCALSTORAGE HELPERS

const LS={
  k:k=>'gp_'+k,
  save(k,v){try{localStorage.setItem(LS.k(k),JSON.stringify(v));}catch(e){}},
  load(k,def){try{const v=localStorage.getItem(LS.k(k));return v!==null?JSON.parse(v):def;}catch(e){return def;}},
  del(k){try{localStorage.removeItem(LS.k(k));}catch(e){}},
};

// ═══════════════════════════════════════════════════════════════════════════
// NOTIFICATION SYSTEM
// ═══════════════════════════════════════════════════════════════════════════
function getJourneyDay(){
  const start=S.batchStart;
  if(!start)return 0;
  return Math.floor((Date.now()-start)/(1000*60*60*24));
}

function scheduleStepNotifs(step){
  if(!step.notif)return;
  const existing=LS.load('notifs',[]);
  const alreadyExists=existing.find(n=>n.triggerDay===step.notif.triggerDay&&n.title===step.notif.title);
  if(alreadyExists)return;
  existing.push({...step.notif,shown:false,id:Date.now()});
  LS.save('notifs',existing);
}

function checkDueNotifs(){
  const day=getJourneyDay();
  const all=LS.load('notifs',[]);
  const due=all.filter(n=>!n.shown&&day>=n.triggerDay);
  return due;
}

function markNotifShown(id){
  const all=LS.load('notifs',[]);
  const updated=all.map(n=>n.id===id?{...n,shown:true}:n);
  LS.save('notifs',updated);
}

function requestNotifPermission(){
  if(typeof Notification==='undefined')return;
  if(Notification.permission==='default'){
    Notification.requestPermission().then(p=>{
      if(p==='granted')LS.save('notifPerm','granted');
    });
  }
}

  tab:'home',
  wineryName:LS.load('wineryName',''),
  skillLevel:LS.load('skillLevel',''),
  batchName:LS.load('batchName','The First One'),
  stepIdx:LS.load('stepIdx',0),
  finished:LS.load('finished',false),
  batchStart:LS.load('batchStart',null),
  logs:LS.load('logs',{}),
  // Transient UI state (not persisted)
  ob:0,tmpName:'',tmpSkill:'',tmpBatch:'The First One',
  showWhy:false,showTemp:false,celebration:false,
  pendingNotif:null,
  // Temp log inputs
  _logData:{},
};

function set(patch){
  Object.assign(S,patch);
  // Persist key state
  if('wineryName'in patch)LS.save('wineryName',S.wineryName);
  if('skillLevel'in patch)LS.save('skillLevel',S.skillLevel);
  if('batchName'in patch)LS.save('batchName',S.batchName);
  if('stepIdx'in patch){LS.save('stepIdx',S.stepIdx);S.showWhy=false;S.showTemp=false;S._logData={};}
  if('finished'in patch)LS.save('finished',S.finished);
  if('batchStart'in patch)LS.save('batchStart',S.batchStart);
  if('screen'in patch)LS.save('screen',S.screen);
  draw();
}

function saveLog(stepIdx,data){
  const existing=S.logs[stepIdx]||{};
  const merged={...existing,...data,timestamp:Date.now()};
  S.logs={...S.logs,[stepIdx]:merged};
  LS.save('logs',S.logs);
  // ABV auto-calc when FG is recorded
  if(data.sg_reading){
    const ogLog=Object.values(S.logs).find(l=>l.og_reading&&l.og_reading>1.05);
    if(!ogLog){
      // Check step 2 log (index 1) for OG
      const step2Log=S.logs[1];
      if(step2Log&&step2Log.sg_reading&&step2Log.sg_reading>1.05&&data.sg_reading<1.05){
        const abv=((step2Log.sg_reading-data.sg_reading)*131.25).toFixed(1);
        const allLogs={...S.logs};
        allLogs[stepIdx]={...allLogs[stepIdx],calculated_abv:abv};
        S.logs=allLogs;
        LS.save('logs',S.logs);
      }
    }
  }
  draw();
}

// DOM HELPERS
// ═══════════════════════════════════════════════════════════════════════════
function el(tag,attrs,...kids){
  const n=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==='style'&&typeof v==='object')Object.assign(n.style,v);
    else if(k==='onClick')n.onclick=v;
    else if(k==='className')n.className=v;
    else if(k==='onInput')n.oninput=e=>v(e.target.value);
    else if(k==='onChange')n.onchange=e=>v(e.target.value);
    else n.setAttribute(k,v);
  }
  for(const c of kids.flat(Infinity)){
    if(c==null||c===false)continue;
    n.appendChild(c instanceof Node?c:document.createTextNode(String(c)));
  }
  return n;
}
const d=(s,...k)=>el('div',{style:s},...k);
const p=(s,...k)=>el('p',{style:s},...k);
const b=(s,cb,...k)=>el('button',{style:s,onClick:cb},...k);
const sp=(s,...k)=>el('span',{style:s},...k);

function inp(style,placeholder,val,cb,type='text'){
  const i=el('input',{style,placeholder,type,value:val||''});
  i.oninput=e=>cb(e.target.value);
  return i;
}
function sel(style,opts,val,cb){
  const s=el('select',{style});
  opts.forEach(o=>{
    const opt=el('option',{value:o.v||o});
    opt.textContent=o.l||o;
    if((o.v||o)===val)opt.selected=true;
    s.appendChild(opt);
  });
  s.onchange=e=>cb(e.target.value);
  return s;
}
function textarea(style,placeholder,val,cb){
  const t=el('textarea',{style,placeholder});
  t.value=val||'';
  t.oninput=e=>cb(e.target.value);
  return t;
}

// INLINE STEP LOGGER
// Renders log fields for a given step inline on the step screen
// ═══════════════════════════════════════════════════════════════════════════
function renderLogger(stepIdx){
  const step=STEPS[stepIdx];
  if(!step.logFields||step.logFields.length===0)return null;

  const saved=S.logs[stepIdx]||{};
  const tmp=S._logData;
  const isSaved=Object.keys(saved).length>1; // more than just timestamp

  // Helper to get current value (temp input or saved)
  const val=(k)=>tmp[k]!==undefined?tmp[k]:(saved[k]||'');

  const inputStyle={
    background:'#f8f8ff',border:'1.5px solid #d0d0e0',borderRadius:8,
    padding:'9px 10px',fontSize:14,outline:'none',width:'100%',
    fontFamily:"'Courier New',monospace"
  };
  const labelStyle={fontSize:10,color:B.dim,fontWeight:600,
    textTransform:'uppercase',letterSpacing:'.05em',marginBottom:4,display:'block'};

  const rows=[];

  // OG reading (step 2, index 1)
  if(step.logFields.includes('sg_reading')){
    const isOG=stepIdx===1;
    const label=isOG?'OG Reading':'SG Reading';
    const ph=isOG?'e.g. 1.090':'e.g. 1.050';
    rows.push(d({marginBottom:10},
      el('label',{style:labelStyle},label),
      inp({...inputStyle,fontFamily:"'Courier New',monospace"},ph,val('sg_reading'),v=>{
        tmp.sg_reading=parseFloat(v)||v;
      },'number')
    ));
    // ABV auto-calc hint
    if(!isOG&&saved.sg_reading){
      const ogLog=S.logs[1];
      if(ogLog&&ogLog.sg_reading>1.05){
        const abv=((ogLog.sg_reading-saved.sg_reading)*131.25).toFixed(1);
        rows.push(d({background:'#fff0ff',borderRadius:8,padding:'8px 10px',
          marginBottom:10,display:'flex',justifyContent:'space-between'},
          sp({fontSize:12,color:B.dim},'Calculated ABV'),
          sp({fontSize:16,fontWeight:700,color:B.grape,fontFamily:"'Courier New',monospace"},abv+'%')
        ));
      }
    }
  }

  if(step.logFields.includes('calculated_abv')){
    const ogLog=S.logs[1];
    const fgVal=parseFloat(val('sg_reading'))||saved.sg_reading;
    if(ogLog&&ogLog.sg_reading&&fgVal){
      const abv=((ogLog.sg_reading-fgVal)*131.25).toFixed(1);
      rows.push(d({background:'#fff0ff',border:'1.5px solid #f0f',borderRadius:8,
        padding:'10px 12px',marginBottom:10},
        d({fontSize:10,color:B.grape,fontWeight:600,textTransform:'uppercase',
          letterSpacing:'.06em',marginBottom:4},'ABV Unlocked'),
        d({display:'flex',justifyContent:'space-between',alignItems:'center'},
          sp({fontSize:13,color:B.dim},'(OG '+ogLog.sg_reading+' − FG '+fgVal+') × 131.25'),
          sp({fontSize:22,fontWeight:700,color:B.grape,fontFamily:"'Courier New',monospace"},abv+'%')
        )
      ));
    }
  }

  if(step.logFields.includes('temperature_c')){
    rows.push(d({marginBottom:10},
      el('label',{style:labelStyle},'Temperature °C'),
      inp({...inputStyle},val('temperature_c')!==''?String(val('temperature_c')):'','',v=>{tmp.temperature_c=parseFloat(v)||v;},'number')
    ));
    // Temp status
    const t=parseFloat(val('temperature_c'));
    if(t){
      const ok=t>=18&&t<=26;
      const hot=t>26;
      rows.push(d({background:hot?'#1a0505':ok?'#0a1a0a':'#05051a',
        borderRadius:8,padding:'7px 10px',marginBottom:10,
        display:'flex',justifyContent:'space-between',alignItems:'center'},
        sp({fontSize:12,color:hot?B.warn:ok?B.green:B.cyan},
          hot?'🔥 Too warm':ok?'✓ Perfect':'❄️ Too cold'),
        sp({fontSize:12,color:'#aaa'},t+'°C')
      ));
    }
  }

  if(step.logFields.includes('airlock_activity')){
    rows.push(d({marginBottom:10},
      el('label',{style:labelStyle},'Airlock activity'),
      sel({...inputStyle},
        ['','Yes — bubbling','Slow but visible','Nothing yet'],
        val('airlock_activity'),v=>{tmp.airlock_activity=v;draw();})
    ));
  }

  if(step.logFields.includes('smell_check')){
    rows.push(d({marginBottom:10},
      el('label',{style:labelStyle},'Smell'),
      sel({...inputStyle},
        ['','Fruity & yeasty (good)','Vinegary','Rotten egg','Off — not sure'],
        val('smell_check'),v=>{tmp.smell_check=v;draw();})
    ));
  }

  if(step.logFields.includes('clarity_check')){
    rows.push(d({marginBottom:10},
      el('label',{style:labelStyle},'Clarity'),
      sel({...inputStyle},
        ['','Crystal clear','Mostly clear','Still hazy','Very hazy'],
        val('clarity_check'),v=>{tmp.clarity_check=v;draw();})
    ));
  }

  if(step.logFields.includes('colour_check')){
    rows.push(d({marginBottom:10},
      el('label',{style:labelStyle},'Colour'),
      inp({...inputStyle},'e.g. Deep ruby-purple',val('colour_check'),v=>{tmp.colour_check=v;})
    ));
  }

  if(step.logFields.includes('fining_agent_used')){
    rows.push(d({marginBottom:10},
      el('label',{style:labelStyle},'Fining agent used'),
      inp({...inputStyle},'e.g. Bentonite',val('fining_agent_used'),v=>{tmp.fining_agent_used=v;})
    ));
  }

  if(step.logFields.includes('oak_used')){
    rows.push(d({marginBottom:10},
      el('label',{style:labelStyle},'Oak type used'),
      inp({...inputStyle},'e.g. Medium toast American',val('oak_used'),v=>{tmp.oak_used=v;})
    ));
  }

  if(step.logFields.includes('bottles_filled')){
    rows.push(d({marginBottom:10},
      el('label',{style:labelStyle},'Bottles filled'),
      inp({...inputStyle},'e.g. 6',val('bottles_filled'),v=>{tmp.bottles_filled=v;},'number')
    ));
  }

  if(step.logFields.includes('final_rating')){
    const cur=val('final_rating');
    rows.push(d({marginBottom:10},
      el('label',{style:labelStyle},'Rating'),
      d({display:'flex',gap:8},
        ...[1,2,3,4,5].map(i=>b({
          background:cur>=i?B.grape:'#1a1a3a',
          border:`1px solid ${cur>=i?B.grape:'#333'}`,
          borderRadius:20,padding:'5px 12px',fontSize:13,color:'#fff',
          minWidth:36},
          ()=>{tmp.final_rating=i;draw();},
          '★'
        ))
      )
    ));
  }

  if(step.logFields.includes('tasting_notes')||step.logFields.includes('final_tasting_notes')){
    const key=step.logFields.includes('tasting_notes')?'tasting_notes':'final_tasting_notes';
    rows.push(d({marginBottom:10},
      el('label',{style:labelStyle},'Tasting notes'),
      textarea({...inputStyle,resize:'none',height:60,display:'block'},
        'What do you taste?',val(key),v=>{tmp[key]=v;})
    ));
  }

  if(step.logFields.includes('notes')){
    rows.push(d({marginBottom:10},
      el('label',{style:labelStyle},'Notes'),
      textarea({...inputStyle,resize:'none',height:52,display:'block'},
        'Anything to note...',val('notes'),v=>{tmp.notes=v;})
    ));
  }

  if(rows.length===0)return null;

  const saveBtn=b({
    width:'100%',
    background:isSaved?'#0a1a0a':B.blue,
    color:'#fff',border:'none',borderRadius:14,
    padding:'10px',fontSize:12,fontWeight:600},
    ()=>{
      const dataToSave={...tmp};
      if(Object.keys(dataToSave).length>0){
        saveLog(stepIdx,dataToSave);
        S._logData={};
      }
    },
    isSaved?'✓ Entry saved — tap to update':'Save this entry'
  );

  return d({background:B.cardBg,borderRadius:12,padding:'14px 16px',marginBottom:12},
    d({display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12},
      sp({fontSize:11,color:B.cyan,fontWeight:600,textTransform:'uppercase',
        letterSpacing:'.08em'},'📊 Log this step'),
      isSaved?sp({fontSize:10,color:B.green},'✓ saved'):'',
    ),
    ...rows,
    saveBtn
  );
}

// ── Step Screen ─────────────────────────────────────────────────────────────
function Step(){
  const step=STEPS[S.stepIdx];
  const phase=PHASES[step.ph-1];
  const pct=(S.stepIdx/TOTAL)*100;

  const nextStep=()=>{
    const nx=S.stepIdx+1;
    if(nx>=TOTAL){set({finished:true,celebration:false,tab:'home'});}
    else{
      // Schedule this step's notification
      scheduleStepNotifs(step);
      set({stepIdx:nx,celebration:false,tab:'home'});
    }
  };
  const done=()=>{
    // Auto-save any temp log data
    if(Object.keys(S._logData).length>0){
      saveLog(S.stepIdx,{...S._logData});
      S._logData={};
    }
    if(step.milestone&&step.celebration)set({celebration:true});
    else nextStep();
  };

  // Celebration overlay
  const celeb=S.celebration?d({
    position:'fixed',inset:0,background:'rgba(13,13,26,.97)',zIndex:100,
    display:'flex',flexDirection:'column',alignItems:'center',
    justifyContent:'center',padding:'2rem',textAlign:'center',
    animation:'celebIn .35s ease both'},
    d({fontSize:'3.5rem',marginBottom:'1rem',display:'inline-block',
      animation:'pulse 1.4s infinite'},'🍷'),
    d({fontFamily:'Georgia,serif',fontSize:22,color:B.grape,
      marginBottom:12,lineHeight:1.3},step.title),
    p({fontSize:14,color:'#fff',fontStyle:'italic',lineHeight:1.7,
      marginBottom:32,maxWidth:300},`"${step.celebration}"`),
    b({background:B.grape,color:B.ink,border:'none',borderRadius:24,
      padding:'14px 40px',fontSize:15,fontWeight:700},nextStep,'Continue →')
  ):null;

  return d({background:B.ink,flex:1,display:'flex',flexDirection:'column',overflowY:'auto'},
    celeb,
    // Status bar
    d({display:'flex',justifyContent:'space-between',padding:'12px 18px 0',
      color:B.dim,fontSize:11},
      sp({fontFamily:'monospace'},'9:41'),
      sp({color:B.cyan,fontFamily:'monospace',fontSize:10},
        'Step '+(S.stepIdx+1)+' of '+TOTAL)
    ),
    // Progress bar
    d({height:3,background:'#1a1a3a',margin:'8px 0 0'},
      d({height:3,background:B.grape,width:`${pct}%`,
        borderRadius:'0 2px 2px 0',transition:'width .4s'})
    ),
    // Scrollable content
    d({flex:1,overflowY:'auto',padding:'16px 18px 100px'},
      // Phase badge
      d({display:'flex',alignItems:'center',gap:8,marginBottom:12},
        d({width:8,height:8,borderRadius:'50%',background:phase.color,flexShrink:0}),
        sp({fontSize:10,fontWeight:600,color:phase.color,textTransform:'uppercase',
          letterSpacing:'.08em'},`${phase.name} · ${step.day}`)
      ),
      p({fontSize:12,color:B.cyan,fontStyle:'italic',marginBottom:8},step.tagline),
      el('h1',{style:{fontFamily:'Georgia,serif',fontSize:26,color:'#fff',
        lineHeight:1.2,marginBottom:16,fontWeight:400}},step.title),
      p({fontSize:14,color:B.grey,lineHeight:1.75,marginBottom:16},step.instruction),
      // Chips
      d({display:'flex',gap:8,flexWrap:'wrap',marginBottom:16},
        ...(step.timer?[sp({background:'#1a1a3a',color:B.grape,borderRadius:20,
          padding:'5px 12px',fontSize:11,fontWeight:500,fontFamily:'monospace'},
          '⏱ '+step.timer)]:[]),
        ...(step.temp?[b({background:S.showTemp?'#f90':'#1a1a3a',
          color:S.showTemp?B.ink:'#f90',border:'none',borderRadius:20,
          padding:'5px 12px',fontSize:11,fontWeight:500,fontFamily:'monospace'},
          ()=>set({showTemp:!S.showTemp}),
          '🌡 Temp '+(S.showTemp?'▲':'▼'))]:[])
      ),
      // Temp panel
      ...(S.showTemp&&step.temp?[d({background:'#1a0f00',border:'1px solid #f90',
        borderRadius:10,padding:'12px 14px',marginBottom:16},
        d({fontSize:10,color:'#f90',fontWeight:600,textTransform:'uppercase',

        p({fontSize:12,color:'#ffd080',lineHeight:1.6,margin:0},step.temp),
        ...(step.tempHot?[p({fontSize:12,color:'#ff8080',lineHeight:1.6,
          margin:'8px 0 0',borderTop:'1px solid #3a2000',paddingTop:8},'🔥 '+step.tempHot)]:[] )
      )]:[] ),
      // Warning
      ...(step.warning?[d({background:'#180008',border:'1px solid #ff2d55',
        borderRadius:10,padding:'12px 14px',marginBottom:16},
        d({fontSize:10,color:B.warn,fontWeight:600,textTransform:'uppercase',
          letterSpacing:'.06em',marginBottom:4},'⚠ Watch out'),
        p({fontSize:12,color:'#ffb0b8',lineHeight:1.6,margin:0},step.warning)
      )]:[] ),
      // Coach
      d({background:B.cardBg,borderRadius:12,padding:'14px 16px',marginBottom:12},
        d({fontSize:10,color:B.grape,fontWeight:600,textTransform:'uppercase',
          letterSpacing:'.08em',marginBottom:6},'Glug Plonk Coach'),
        p({fontSize:13,color:'#e0e0e0',fontStyle:'italic',lineHeight:1.65,margin:0},
          `"${step.coach}"`)
      ),
      // Science
      ...(step.why?[
        b({background:'transparent',border:'1px solid #2a2a4a',borderRadius:20,
          padding:'6px 14px',fontSize:11,color:B.dim,marginBottom:8},
          ()=>set({showWhy:!S.showWhy}),
          '⚗ The science bit '+(S.showWhy?'▲':'▼')),
        ...(S.showWhy?[d({background:B.parchment,borderRadius:10,
          padding:'12px 14px',marginBottom:12},
          d({fontSize:10,color:'#b06020',fontWeight:600,textTransform:'uppercase',
            letterSpacing:'.06em',marginBottom:6},'The science bit'),
          p({fontSize:12,color:'#4a3010',lineHeight:1.65,margin:0},step.why)
        )]:[] )
      ]:[]),
      // ── INLINE LOGGER ──
      renderLogger(S.stepIdx)
    ),
    // Fixed Done button
    d({position:'sticky',bottom:0,padding:'12px 18px 20px',
      background:'linear-gradient(to top,#0d0d1a 60%,transparent)'},
      b({width:'100%',background:B.grape,color:B.ink,border:'none',
        borderRadius:24,padding:'16px',fontSize:'15px',fontWeight:700,
        letterSpacing:'.04em',boxShadow:'0 0 28px #ff00ff44'},
        done,'Done — next step ↗')
    )
  );
}

// ── Brew Log (timeline of all logged data) ─────────────────────────────────
function Log(){
  const entries=Object.entries(S.logs)
    .map(([idx,data])=>({idx:parseInt(idx),step:STEPS[parseInt(idx)],data}))
    .filter(e=>e.step)
    .sort((a,b)=>a.idx-b.idx);

  // OG/FG for ABV summary
  const ogLog=S.logs[1];
  const fgIdx=entries.findIndex(e=>e.step.logFields&&e.step.logFields.includes('calculated_abv'));
  const fgLog=fgIdx>=0?entries[fgIdx].data:null;

  return d({background:B.lightBg,flex:1,overflowY:'auto',padding:'16px 16px 20px'},
    d({fontFamily:'Georgia,serif',fontSize:24,color:B.ink,marginBottom:4,padding:'0 4px'},'Brew Log'),
    d({fontSize:12,color:B.dim,marginBottom:16,padding:'0 4px'},"Beginner's Shiraz · Batch #001"),

    // ABV summary card (if both OG and FG available)
    ...(ogLog&&ogLog.sg_reading&&fgLog&&fgLog.sg_reading?[
      d({background:B.ink,borderRadius:14,padding:'14px 16px',marginBottom:16},
        d({fontSize:10,color:B.grape,fontWeight:600,textTransform:'uppercase',
          letterSpacing:'.08em',marginBottom:8},'ABV Summary'),
        d({display:'flex',justifyContent:'space-around',textAlign:'center'},
          d({},d({fontSize:10,color:B.dim,marginBottom:4},'OG'),
            d({fontSize:20,fontFamily:'monospace',fontWeight:700,color:'#fff'},
              ogLog.sg_reading.toFixed(3))),
          d({alignSelf:'center',fontSize:20,color:B.dim},'→'),
          d({},d({fontSize:10,color:B.dim,marginBottom:4},'FG'),
            d({fontSize:20,fontFamily:'monospace',fontWeight:700,color:'#fff'},
              fgLog.sg_reading.toFixed(3))),
          d({alignSelf:'center',fontSize:20,color:B.dim},'='),
          d({},d({fontSize:10,color:B.grape,marginBottom:4,fontWeight:600},'ABV'),
            d({fontSize:24,fontFamily:'monospace',fontWeight:700,color:B.grape},
              ((ogLog.sg_reading-fgLog.sg_reading)*131.25).toFixed(1)+'%'))
        )
      )
    ]:[]),

    // Entry list
    entries.length>0?d({display:'flex',flexDirection:'column',gap:8},
      ...entries.map(e=>{
        const phase=PHASES[e.step.ph-1];
        const d2=e.data;
        const fields=Object.entries(d2)
          .filter(([k])=>k!=='timestamp')
          .map(([k,v])=>`${k.replace(/_/g,' ')}: ${v}`)
          .join(' · ');
        return d({background:'#fff',border:'1.5px solid #e0e0f0',
          borderRadius:12,padding:'12px 14px'},
          d({display:'flex',justifyContent:'space-between',alignItems:'flex-start',
            marginBottom:6},
            d({},
              d({display:'flex',alignItems:'center',gap:5,marginBottom:3},
                d({width:6,height:6,borderRadius:'50%',
                  background:phase.color,flexShrink:0}),
                sp({fontSize:10,fontWeight:600,color:phase.color,
                  textTransform:'uppercase',letterSpacing:'.04em'},phase.name)
              ),
              d({fontSize:13,fontWeight:500,color:B.ink},
                'Step '+(e.idx+1)+': '+e.step.title)
            ),
            sp({fontSize:10,color:B.dim,flexShrink:0,marginLeft:8},
              d2.timestamp?new Date(d2.timestamp).toLocaleDateString('en-SG'):'')
          ),
          p({fontSize:11,color:B.dim,lineHeight:1.6},fields)
        );
      })
    ):d({textAlign:'center',padding:'40px 20px'},
      d({fontSize:32,marginBottom:12},'📊'),
      d({fontSize:14,color:B.dim},'Log your readings during the journey.')
    )
  );
}

// ── The Cellar ─────────────────────────────────────────────────────────────
function Cellar(){
  const posts=[
    {winery:'Garage Noir Wines',region:'Singapore',batch:'The First One',wine:"Lo-fi Shiraz",abv:12.8,kudos:7},
    {winery:'Rooftop Reds',region:'Melbourne, AU',batch:'Sunday Sessions',wine:'Apartment White',abv:11.4,kudos:14},
    {winery:'Kitchen Bench Co',region:'London, UK',batch:'For Mum',wine:"Lo-fi Rosé",abv:11.9,kudos:22},
  ];
  let counts=[...posts.map(p=>p.kudos)];
  return d({background:B.lightBg,flex:1,overflowY:'auto',padding:'16px 16px 20px'},
    d({fontFamily:'Georgia,serif',fontSize:24,color:B.ink,marginBottom:4,padding:'0 4px'},'The Cellar'),
    d({fontSize:12,color:B.dim,marginBottom:20,padding:'0 4px'},'Home winemakers, worldwide.'),
    d({display:'flex',flexDirection:'column',gap:10},
      ...posts.map((post,i)=>{
        const kb=b({background:'transparent',border:'1px solid #e0e0f0',
          borderRadius:20,padding:'5px 14px',fontSize:11,color:B.dim},
          ()=>{counts[i]++;kb.textContent='🍷 '+counts[i]+' kudos';},
          '🍷 '+counts[i]+' kudos');
        return d({background:'#fff',border:'1.5px solid #e0e0f0',borderRadius:16,padding:16},
          d({display:'flex',justifyContent:'space-between',marginBottom:8},
            d({},d({fontSize:13,fontWeight:600,color:B.ink},post.winery),
              d({fontSize:11,color:B.dim},post.region))
          ),
          d({fontFamily:'Georgia,serif',fontSize:17,color:B.grape,marginBottom:3},post.batch),
          d({fontSize:12,color:B.dim,marginBottom:12},post.wine+' · '+post.abv+'% ABV'),
          kb
        );
      })
    )
  );
}

// ── Vintage Card ─────────────────────────────────────────────────────────
function Vintage(){
  const ogLog=S.logs[1];
  const fgLog=Object.values(S.logs).find(l=>l.sg_reading&&l.sg_reading<1.05);
  const abv=(ogLog&&fgLog)?((ogLog.sg_reading-fgLog.sg_reading)*131.25).toFixed(1):null;

  return d({background:B.ink,height:'100%',display:'flex',flexDirection:'column',
    alignItems:'center',justifyContent:'center',padding:'2rem 1.5rem',
    textAlign:'center',overflowY:'auto'},
    d({fontSize:12,color:B.dim,letterSpacing:'.12em',textTransform:'uppercase',marginBottom:24},'Journey complete'),
    d({border:`2px solid ${B.grape}`,borderRadius:20,padding:'28px 24px',
      maxWidth:320,width:'100%',marginBottom:32,background:'#ffffff08'},
      d({fontSize:10,color:B.dim,letterSpacing:'.12em',textTransform:'uppercase',marginBottom:12},
        `${S.wineryName||'My Winery'} · Batch #001`),
      d({fontFamily:'Georgia,serif',fontSize:28,color:'#fff',marginBottom:6,lineHeight:1.2},
        S.batchName||'The First One'),
      d({fontSize:11,color:B.dim,letterSpacing:'.08em',textTransform:'uppercase',marginBottom:20},
        `${new Date().getFullYear()} · Beginner's Shiraz`),
      d({height:1,background:'#333',marginBottom:20}),
      p({fontSize:12,color:B.grey,fontStyle:'italic',lineHeight:1.6,marginBottom:20},
        '"Dark fruit, pepper, and the unmistakable taste of something you made yourself."'),
      d({display:'flex',justifyContent:'center',gap:16,fontSize:11,color:B.dim,marginBottom:16},
        sp({},abv?abv+'% ABV':'~12% ABV'),sp({},'·'),sp({},'6 bottles')),
      d({fontSize:12,color:B.grape,letterSpacing:'.08em',textTransform:'uppercase',
        fontWeight:600,marginBottom:4},'Certified gluggable'),
      d({fontSize:10,color:B.dim},'Made with Glug Plonk')
    ),
    b({background:B.grape,color:B.ink,border:'none',borderRadius:24,
      padding:'14px 36px',fontSize:14,fontWeight:700,letterSpacing:'.04em'},
      ()=>set({finished:false,stepIdx:0,tab:'home',logs:{},showWhy:false,showTemp:false}),
      'Start Batch #002 ↗')
  );
}

// ── Bottom Nav ─────────────────────────────────────────────────────────────
function BottomNav(){
  const logCount=Object.keys(S.logs).length;
  const tabs=[
    {id:'home',icon:'🏠',label:'Home'},
    {id:'step',icon:'🍷',label:'Journey'},
    {id:'log',icon:'📊',label:'Brew Log',badge:logCount||null},
    {id:'cellar',icon:'👥',label:'The Cellar'},
  ];
  return d({display:'flex',background:'rgba(255,255,255,.96)',
    backdropFilter:'blur(12px)',borderTop:'1px solid #e0e0f0'},
    ...tabs.map(t=>b({flex:1,background:'transparent',border:'none',
      padding:'10px 0 18px',position:'relative',
      borderTop:S.tab===t.id?`2px solid ${B.grape}`:'2px solid transparent'},
      ()=>set({tab:t.id}),
      d({fontSize:20,marginBottom:2},t.icon),
      ...(t.badge?[d({position:'absolute',top:6,right:'calc(50% - 16px)',
        background:B.grape,borderRadius:10,padding:'1px 5px',
        fontSize:9,color:B.ink,fontWeight:700},String(t.badge))]:[] ),
      d({fontSize:10,color:S.tab===t.id?B.grape:B.dim,
        fontWeight:S.tab===t.id?600:400},t.label)
    ))
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════════════════════
function draw(){
  const app=document.getElementById('app');
  while(app.firstChild)app.removeChild(app.firstChild);

  // Check for due notifications
  const due=checkDueNotifs();
  if(due.length>0&&!S.pendingNotif){
    S.pendingNotif=due[0];
  }

  if(S.screen==='splash'){app.appendChild(Splash());return;}
  if(S.screen==='onboard'){app.appendChild(Onboard());return;}
  if(S.finished){
    const w=d({height:'100%',overflowY:'auto'});
    w.appendChild(Vintage());app.appendChild(w);return;
  }

  const wrap=d({display:'flex',flexDirection:'column',height:'100%'});

  // Notification banner (shown in main app only)
  if(S.pendingNotif){
    wrap.appendChild(NotifBanner(S.pendingNotif));
  }

  const content=
    S.tab==='home'?Home():
    S.tab==='step'?Step():
    S.tab==='log'?Log():Cellar();
  wrap.appendChild(content);
  wrap.appendChild(BottomNav());
  app.appendChild(wrap);
}

draw();
</script>
