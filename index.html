<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Pacifico&display=swap" rel="stylesheet" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>Glug Plonk — Private Batch</title>
<meta name="description" content="A cheeky guided home winemaking app.">
<meta name="theme-color" content="#641032">
<style>
:root{--ink:#151112;--wine:#64172f;--wine2:#8a1739;--plum:#3b1528;--pink:#e94b70;--blush:#f8cbd2;--paper:#fff7ee;--paper2:#fffaf4;--lime:#d6ec45;--muted:#6f6365;--line:rgba(21,17,18,.14);--good:#2f7d51;--warn:#b84638;--hard:5px 5px 0 #151112;}
*{box-sizing:border-box} html,body{margin:0;height:100%;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--ink);color:var(--ink);}
body{display:flex;justify-content:center;align-items:stretch;}
#app{width:100%;max-width:460px;height:100dvh;background:var(--paper);position:relative;overflow:hidden;box-shadow:0 0 0 1px #0002,0 12px 60px #0007;}
.app-shell{height:100%;display:flex;flex-direction:column;}
.main{flex:1;overflow:auto;padding:18px 18px 98px;background:radial-gradient(circle at 10% 0%,rgba(255,247,238,.95) 0 120px,transparent 121px),radial-gradient(circle at 92% 18%,rgba(214,236,69,.18) 0 80px,transparent 81px),var(--paper);}
.brand{font-family:Georgia,'Times New Roman',serif;font-weight:800;letter-spacing:-.05em;line-height:.9;}
.script{font-family:'Caveat','Comic Sans MS','Bradley Hand',cursive;letter-spacing:.02em;}
.kicker{font-size:11px;text-transform:uppercase;letter-spacing:.13em;color:var(--muted);font-weight:800;}
.h1{font-family:Georgia,'Times New Roman',serif;font-size:34px;line-height:.95;margin:8px 0 10px;letter-spacing:-.04em;}
.h2{font-family:Georgia,'Times New Roman',serif;font-size:26px;line-height:1.04;margin:0 0 10px;letter-spacing:-.035em;}
.p{font-size:14px;line-height:1.55;color:#4f443f;margin:0;}
button{font:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.btn{border:1.5px solid var(--ink);border-radius:999px;background:var(--wine);color:white;padding:15px 18px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;box-shadow:var(--hard);transition:.18s ease;}
.btn.alt{background:#fff;color:var(--wine);border:1.5px solid var(--ink);box-shadow:4px 4px 0 rgba(21,17,18,.16);}
.btn.lime{background:var(--lime);color:var(--ink);border:1.5px solid var(--ink);box-shadow:var(--hard);}
.card{background:var(--paper2);border:1.5px solid rgba(21,17,18,.18);border-radius:22px;padding:16px;box-shadow:0 8px 22px rgba(44,15,27,.08);}
.row{display:flex;gap:12px;align-items:center} .between{display:flex;align-items:center;justify-content:space-between;gap:12px}
.tag{display:inline-flex;align-items:center;border:1.5px solid currentColor;background:#fff;border-radius:999px;padding:5px 10px;font-size:11px;color:var(--muted);font-weight:900;letter-spacing:.06em;text-transform:uppercase;}
.stamp{display:inline-block;border:1.5px solid var(--ink);border-radius:999px;padding:7px 12px;color:var(--ink);font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;background:#fff;box-shadow:3px 3px 0 var(--ink);transform:rotate(-1deg);}
.icon{width:40px;height:40px;border-radius:13px;background:var(--wine);color:white;display:grid;place-items:center;font-family:Georgia,serif;font-weight:900;font-size:18px;box-shadow:4px 4px 0 var(--ink);border:1.5px solid var(--ink);position:relative;overflow:hidden;}
.nav{position:absolute;left:0;right:0;bottom:0;height:78px;background:rgba(255,247,238,.92);backdrop-filter:blur(18px);border-top:1px solid rgba(21,17,18,.12);display:grid;grid-template-columns:repeat(5,1fr);padding-bottom:env(safe-area-inset-bottom);}
.nav button{border:0;background:transparent;color:var(--muted);font-size:10px;font-weight:800;display:flex;flex-direction:column;gap:4px;align-items:center;justify-content:center;}
.nav .active{color:var(--wine);}
.nav .plus{width:40px;height:40px;border-radius:999px;background:var(--ink);color:white;font-size:24px;margin-top:8px;border:1.5px solid var(--ink);box-shadow:3px 3px 0 var(--lime);}
.progress{height:8px;background:rgba(21,17,18,.1);border-radius:999px;overflow:hidden} .progress>i{display:block;height:100%;background:var(--lime);border-radius:999px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px} .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.journey-card{border:0;border-radius:20px;text-align:left;padding:16px;color:var(--ink);min-height:118px;position:relative;overflow:hidden;box-shadow:0 6px 18px #0001;}
.journey-card:after{content:'○ ○ ○';position:absolute;right:12px;top:10px;color:#fff9;font-weight:900;letter-spacing:-2px;}
.field{width:100%;border:1.5px solid var(--line);border-radius:14px;background:#fffaf7;padding:13px 12px;font:inherit;font-size:15px;outline:none;color:var(--ink);}
input[type=number]{appearance:textfield} .small{font-size:12px;color:var(--muted);line-height:1.45} .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}
.issue{border:1.5px solid var(--line);background:#fffaf0;border-radius:16px;padding:13px;text-align:left;}
.fade{animation:fade .35s ease both} @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--ink);color:white;border-radius:999px;padding:12px 18px;font-size:13px;font-weight:800;z-index:9;}
/* Enhancement styles */
.kit-row{width:100%;border:0;background:transparent;text-align:left;padding:11px 0;border-top:1px solid var(--line);cursor:pointer;display:flex;align-items:center;gap:12px;}
.kit-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;transition:all .15s;}
.kit-check.on{background:var(--good);border-color:var(--good);color:white;}
.log-section{background:var(--paper);border:1.5px solid var(--line);border-radius:18px;padding:14px;margin-bottom:14px;}
.celeb-overlay{position:fixed;inset:0;background:var(--wine);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px;animation:fade .4s ease both;}
.modal-overlay{position:fixed;inset:0;background:#0008;z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.modal-sheet{width:100%;max-width:460px;background:var(--paper2);border-radius:24px 24px 0 0;padding:24px;max-height:80vh;overflow-y:auto;animation:slideUp .3s ease both;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
@keyframes celebPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
/* Speakeasy entrance */
.speakeasy{position:relative;padding:0!important;background:#1a0a12!important;height:100%;overflow:hidden}
.speak-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:38px 30px;opacity:0;pointer-events:none;transition:opacity .5s ease}
.speak-screen.on{opacity:1;pointer-events:auto}
.speak-screen.door{background:radial-gradient(circle at 50% 36%,#3b1528 0%,#1a0a12 72%)}
.speak-screen.pass{background:linear-gradient(180deg,#1a0a12,#3b1528)}
.speak-screen.cellar{background:radial-gradient(circle at 50% 30%,#64172f 0%,#1a0a12 76%)}
.speak-dots{position:absolute;top:26px;left:0;right:0;display:flex;justify-content:center;gap:8px}
.sd{width:7px;height:7px;border-radius:50%;background:#64172f;transition:.3s}
.sd.on{background:var(--lime);width:22px;border-radius:999px}
.peep{width:84px;height:84px;border-radius:50%;border:3px solid #64172f;display:flex;align-items:center;justify-content:center;margin-bottom:26px;background:#150810;box-shadow:0 0 0 6px rgba(100,23,47,.18)}
.peep .leye{font-size:34px;font-style:normal}
.speak-kicker{font-family:"Courier New",monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#c98aa0;margin-bottom:14px}
.speak-title{font-family:Georgia,serif;font-size:38px;line-height:.92;color:#fff7ee;letter-spacing:-.02em;margin-bottom:10px;font-weight:800}
.speak-title .pink{color:var(--pink);display:block}
.speak-sub{font-size:20px;color:var(--lime);margin-bottom:32px}
.speak-knock{width:100%;background:var(--wine);color:#fff7ee;border:1.5px solid var(--lime);border-radius:999px;padding:16px;font-family:Georgia,serif;font-weight:800;font-size:16px;letter-spacing:.04em;cursor:pointer;box-shadow:4px 4px 0 var(--lime);transition:.15s ease}
.speak-knock:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--lime)}
.speak-fine{font-family:"Courier New",monospace;font-size:10px;letter-spacing:.12em;color:#8a7079;margin-top:20px;text-transform:uppercase}
.speak-label{font-family:"Courier New",monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#c98aa0;margin-bottom:20px}
.speak-pills{display:flex;flex-direction:column;gap:11px;width:100%}
.speak-pill{background:#150810;border:1.5px solid #64172f;border-radius:16px;padding:15px;color:#fff7ee;font-family:Georgia,serif;font-size:16px;cursor:pointer;transition:.15s ease;text-align:center}
.speak-pill:hover{border-color:var(--lime);background:#211019}
.speak-pill.sel{border-color:var(--lime);background:var(--wine);box-shadow:3px 3px 0 var(--lime)}
.speak-enter{width:100%;margin-top:22px;background:var(--lime);color:#1a0a12;border:1.5px solid var(--lime);border-radius:999px;padding:16px;font-family:Georgia,serif;font-weight:800;font-size:16px;cursor:pointer;opacity:.4;pointer-events:none;transition:.2s ease}
.speak-enter.ready{opacity:1;pointer-events:auto;box-shadow:4px 4px 0 var(--wine)}
.speak-skip{background:transparent;border:0;color:#9a808a;font-family:"Courier New",monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-top:16px;cursor:pointer}
.speak-glass{font-size:64px;margin-bottom:16px;animation:gpfloat 2.4s ease-in-out infinite}
@keyframes gpfloat{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-8px) rotate(3deg)}}
/* Days-alive counter */
.alive-badge{display:inline-flex;align-items:center;gap:7px;background:#150810;border:1.5px solid var(--lime);border-radius:999px;padding:7px 14px;color:var(--lime);font-family:"Courier New",monospace;font-weight:900;font-size:13px;letter-spacing:.04em}
.alive-pulse{width:9px;height:9px;border-radius:50%;background:var(--lime);animation:alivePulse 1.8s ease-in-out infinite}
@keyframes alivePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
</style>
</head>
<body><div id="app"></div>
<script>
const DATA = {"journeys":[{"id":"beginners-shiraz","name":"Beginner's Shiraz","display_name":"Beginner's Shiraz","tagline":"Bold, warm, and forgiving. The perfect first wine.","style":"Red · Full-bodied · Lo-fi","difficulty":"Grape Newbie","duration_days":60,"batch_size":"6 litres (approx. 6 bottles)","target_og":"1.080–1.095","target_fg":"0.998–1.002","target_abv":"12–13%","description":"Dark fruit, pepper, a bit of swagger...","colour":"#6b1235","wine_personality":"Warm extrovert with dangerous confidence.","serving_moment":"BBQ night wine. Accidentally finished the bottle wine.","shareable_quote":"Dark fruit and questionable confidence.","is_featured":true,"sort_order":1},{"id":"lo-fi-rose","name":"Lo-fi Rosé","display_name":"Lo-fi Rosé","tagline":"Pink, fragrant, and done in 50 days. The crowd-pleaser.","style":"Rosé · Medium-bodied · Lo-fi","difficulty":"Grape Newbie","duration_days":50,"batch_size":"6 litres (approx. 6 bottles)","target_og":"1.075–1.085","target_fg":"0.994–1.000","target_abv":"11–12.5%","description":"Fresh, floral rosé from preservative-free grape juice. Fermented cooler than red to preserve strawberry and watermelon character.","colour":"#e8b9b5","wine_personality":"The charming one everyone actually drinks.","serving_moment":"Outdoor dining wine. Cold bottle, warm evening, suspicious refills.","shareable_quote":"Pink chaos, controlled.","is_featured":true,"sort_order":2},{"id":"cabernet-sauvignon","name":"Cabernet Sauvignon","display_name":"Cabernet Sauvignon","tagline":"The cellar classic. Worth every one of its 90 days.","style":"Red · Full-bodied · Lo-fi","difficulty":"Cellar Apprentice","duration_days":90,"batch_size":"6 litres (approx. 6 bottles)","target_og":"1.082–1.095","target_fg":"0.994–1.002","target_abv":"12–14%","description":"The king of home reds. Deep colour, firm tannins, blackcurrant depth. Longer conditioning rewards patience.","colour":"#3b0b1d","wine_personality":"The serious one pretending to be relaxed.","serving_moment":"Special occasion wine. The bottle you open to impress.","shareable_quote":"Structured enough to behave. Doesn't always.","is_featured":true,"sort_order":3},{"id":"apartment-white","name":"Apartment White","display_name":"Apartment White","tagline":"Crisp, fresh, cold. Done in 45 days.","style":"White · Light-bodied · Lo-fi","difficulty":"Grape Newbie","duration_days":45,"batch_size":"6 litres (approx. 6 bottles)","target_og":"1.070–1.082","target_fg":"0.990–0.998","target_abv":"10–12%","description":"A clean, fresh white from preservative-free juice. Fermented cooler than reds. Singapore apartment-friendly.","colour":"#b8bd3b","wine_personality":"Cool-headed minimalist with great taste.","serving_moment":"Fridge-door wine. The one that disappears fastest.","shareable_quote":"Cold, bright, and suspiciously easy to refill.","is_featured":true,"sort_order":4},{"id":"kit-shiraz","name":"Kit Shiraz","display_name":"Kit Shiraz","tagline":"Real wine in three weeks. No fridge required.","style":"Red · Medium-bodied · Concentrate Kit","difficulty":"Grape Newbie","duration_days":28,"batch_size":"6 litres (approx. 6 bottles)","target_og":"1.070–1.082","target_fg":"0.994–1.000","target_abv":"11–12%","description":"A commercial grape concentrate kit made into real wine in 28 days. All additives included — yeast, fining agents, stabiliser. No wild yeast risk, no cold conditioning required.","colour":"#7d1c3a","wine_personality":"Reliable chaos goblin.","serving_moment":"Tuesday-night wine that becomes a Friday problem.","shareable_quote":"Real wine. Mildly suspicious beginnings.","is_featured":true,"sort_order":5},{"id":"kit-cabernet-premium","name":"Premium Kit Cabernet Sauvignon","display_name":"Premium Kit Cabernet Sauvignon","tagline":"Closer to a winery than you'd admit.","style":"Red · Full-bodied · Premium Concentrate Kit","difficulty":"Cellar Apprentice","duration_days":42,"batch_size":"23 litres (approx. 30 bottles)","target_og":"1.082–1.092","target_fg":"0.994–1.000","target_abv":"12–13.5%","description":"A premium concentrate kit approaching fresh juice quality. Optional grape skins pack adds tannin structure. Short conditioning recommended.","colour":"#2e0a18","wine_personality":"Thirty bottles of ambition in a box.","serving_moment":"Dinner party wine. The one that makes people ask where you bought it.","shareable_quote":"Thirty bottles of increasingly dangerous confidence.","is_featured":true,"sort_order":6},{"id":"kit-white-quick","name":"Quick Kit White","display_name":"Quick Kit White","tagline":"White wine in 21 days. Seriously.","style":"White · Light-bodied · Budget Kit","difficulty":"Grape Newbie","duration_days":21,"batch_size":"6 litres (approx. 6 bottles)","target_og":"1.060–1.075","target_fg":"0.990–0.998","target_abv":"10–11.5%","description":"The fastest route to homemade white wine. Beginner-friendly, minimal equipment, drinkable in three weeks. Best drunk young and cold.","colour":"#c4ca52","wine_personality":"The overachiever who finishes in three weeks.","serving_moment":"Sunday afternoon wine. Cold. Gone before dinner.","shareable_quote":"No patience required. Standards somehow intact.","is_featured":false,"sort_order":7}],"phases":[{"id":"beginners-shiraz-phase-1","journey_id":"beginners-shiraz","phase_number":1,"name":"Prep","label":"Prep · Day 0 — boring but essential","day_range":"Day 0","color_hex":"#5DCAA5","temp_note":"Bring your juice to 20–22°C before you do anything else. Check it with your thermometer — it takes 10 seconds and it sets you up for everything that follows."},{"id":"beginners-shiraz-phase-2","journey_id":"beginners-shiraz","phase_number":2,"name":"Primary fermentation","label":"Primary fermentation","day_range":"Day 1-14","color_hex":"#EF9F27","temp_note":"The most temperature-critical phase of the entire journey. Keep your room at 22–24°C consistently. Think of it as the yeast's working conditions — even tiny workers deserve a comfortable environment."},{"id":"beginners-shiraz-phase-3","journey_id":"beginners-shiraz","phase_number":3,"name":"Secondary fermentation","label":"Secondary Fermentation","day_range":"Days 15-28","color_hex":"#7F77DD","temp_note":"Slightly cooler than primary is fine — 18–22°C. Consistency matters more than the exact number. Don't move the carboy to different rooms as the temperature changes."},{"id":"beginners-shiraz-phase-4","journey_id":"beginners-shiraz","phase_number":4,"name":"Clearing & stabilising","label":"Clearing & stabilising","day_range":"Days 29-42","color_hex":"#D85A30","temp_note":"Cooler and completely still is better. Your aircon room works well here. Fining agents settle most effectively when nothing vibrates, nothing changes, and nobody opens the carboy."},{"id":"beginners-shiraz-phase-5","journey_id":"beginners-shiraz","phase_number":5,"name":"Conditioning","label":"Conditioning","day_range":"Days 43-55","color_hex":"#378ADD","temp_note":"This phase requires 10–14°C. "},{"id":"beginners-shiraz-phase-6","journey_id":"beginners-shiraz","phase_number":6,"name":"Bottling & glory","label":"Bottling & Glory","day_range":"Days 56-60+","color_hex":"#c4a96b","temp_note":"Back to 20–24°C. The moment the bottles are sealed, move them into the wine fridge at 12–15°C. "},{"id":"kit-shiraz-phase-1","journey_id":"kit-shiraz","phase_number":1,"name":"Mix & Pitch","label":"Mix & Pitch · Day 0","day_range":"Day 0","color_hex":"#5DCAA5","temp_note":"Add concentrate to water at 20–22°C. Pitch yeast same day — no Campden wait. Concentrate is heat-sterilised."},{"id":"kit-shiraz-phase-2","journey_id":"kit-shiraz","phase_number":2,"name":"Primary fermentation","label":"Primary fermentation · Days 1–7","day_range":"Days 1–7","color_hex":"#EF9F27","temp_note":"Concentrate ferments best at 18–22°C — slightly cooler than fresh juice. Above 26°C flattens the flavour."},{"id":"kit-shiraz-phase-3","journey_id":"kit-shiraz","phase_number":3,"name":"Secondary & Stabilise","label":"Secondary & Stabilise · Days 8–14","day_range":"Days 8–14","color_hex":"#7F77DD","temp_note":"Slightly cooler than primary. Potassium sorbate and sulphite added here — temperature does not affect their efficacy."},{"id":"kit-shiraz-phase-4","journey_id":"kit-shiraz","phase_number":4,"name":"Clearing","label":"Clearing · Days 14–21","day_range":"Days 14–21","color_hex":"#D85A30","temp_note":"Two-part fining (kieselsol + chitosan) clears in 3–5 days at room temperature. More forgiving than bentonite alone."},{"id":"kit-shiraz-phase-5","journey_id":"kit-shiraz","phase_number":5,"name":"Bottling & glory","label":"Bottling & glory · Days 21–28","day_range":"Days 21–28","color_hex":"#c4a96b","temp_note":"Bottle at room temperature. No cold conditioning required. Wine can be enjoyed in 2–4 weeks."},{"id":"kit-cabernet-premium-phase-1","journey_id":"kit-cabernet-premium","phase_number":1,"name":"Mix & Pitch","label":"Mix & Pitch · Day 0","day_range":"Day 0","color_hex":"#5DCAA5","temp_note":"Mix concentrate with water to 23L. Add grape skins pack if included. Pitch yeast same day."},{"id":"kit-cabernet-premium-phase-2","journey_id":"kit-cabernet-premium","phase_number":2,"name":"Primary fermentation","label":"Primary fermentation · Days 1–10","day_range":"Days 1–10","color_hex":"#EF9F27","temp_note":"Slightly longer primary. Keep 18–22°C. If grape skins included, punch down daily for colour and tannin extraction."},{"id":"kit-cabernet-premium-phase-3","journey_id":"kit-cabernet-premium","phase_number":3,"name":"Secondary fermentation","label":"Secondary fermentation · Days 11–21","day_range":"Days 11–21","color_hex":"#7F77DD","temp_note":"Rack off grape skins at Day 10–12. Add stabiliser. Slightly cooler than primary."},{"id":"kit-cabernet-premium-phase-4","journey_id":"kit-cabernet-premium","phase_number":4,"name":"Clearing","label":"Clearing · Days 21–28","day_range":"Days 21–28","color_hex":"#D85A30","temp_note":"Two-part fining for a premium red. Allow 5–7 days undisturbed."},{"id":"kit-cabernet-premium-phase-5","journey_id":"kit-cabernet-premium","phase_number":5,"name":"Short conditioning","label":"Short conditioning · Days 28–35","day_range":"Days 28–35","color_hex":"#378ADD","temp_note":"Optional short conditioning at 15–20°C softens tannins. No wine fridge needed — a cool room works."},{"id":"kit-cabernet-premium-phase-6","journey_id":"kit-cabernet-premium","phase_number":6,"name":"Bottling & glory","label":"Bottling & glory · Days 35–42","day_range":"Days 35–42","color_hex":"#c4a96b","temp_note":"Bottle at room temperature. Rest 4 weeks minimum. Premium Kit Cab improves with 2–3 months."},{"id":"kit-white-quick-phase-1","journey_id":"kit-white-quick","phase_number":1,"name":"Mix & Pitch","label":"Mix & Pitch · Day 0","day_range":"Day 0","color_hex":"#5DCAA5","temp_note":"Mix concentrate with cooler water (18–20°C) — preserves citrus aromatics from the first stir."},{"id":"kit-white-quick-phase-2","journey_id":"kit-white-quick","phase_number":2,"name":"Primary fermentation","label":"Primary fermentation · Days 1–7","day_range":"Days 1–7","color_hex":"#A6B23C","temp_note":"White concentrate ferments best at 17–21°C. Above 24°C dulls the citrus character permanently."},{"id":"kit-white-quick-phase-3","journey_id":"kit-white-quick","phase_number":3,"name":"Clearing & Stabilise","label":"Clearing & Stabilise · Days 7–14","day_range":"Days 7–14","color_hex":"#D85A30","temp_note":"Stabiliser and two-part fining on Day 7. White kits clear quickly — crystal clear within 4–5 days."},{"id":"kit-white-quick-phase-4","journey_id":"kit-white-quick","phase_number":4,"name":"Bottling & glory","label":"Bottling & glory · Days 14–21","day_range":"Days 14–21","color_hex":"#c4a96b","temp_note":"Bottle as soon as clear. White kit wines are best drunk young and cold. Ready in 2 weeks."},{"id":"lo-fi-rose-phase-1","journey_id":"lo-fi-rose","phase_number":1,"name":"Prep","label":"Prep · Day 0","day_range":"Day 0","color_hex":"#5DCAA5","temp_note":"Bring juice to 18°C before adding Campden. Note the colour — pale pink, salmon, or ruby. Temperature affects colour extraction even at prep stage."},{"id":"lo-fi-rose-phase-2","journey_id":"lo-fi-rose","phase_number":2,"name":"Primary fermentation","label":"Primary fermentation · Days 1–10","day_range":"Days 1–10","color_hex":"#EF9F27","temp_note":"Cooler than red (16–22°C), warmer than white. 18–20°C preserves strawberry and watermelon freshness. Above 23°C gives stewed jam instead of fresh fruit. Water bath if room runs warm."},{"id":"lo-fi-rose-phase-3","journey_id":"lo-fi-rose","phase_number":3,"name":"Rack light","label":"Rack light · Days 10–14","day_range":"Days 10–14","color_hex":"#7F77DD","temp_note":"Gentle racking preserves delicate pink colour. Splashing causes browning and oxidation in rosé faster than in red wine. Keep 15–21°C throughout."},{"id":"lo-fi-rose-phase-4","journey_id":"lo-fi-rose","phase_number":4,"name":"Secondary fermentation","label":"Secondary fermentation · Days 15–28","day_range":"Days 15–28","color_hex":"#D85A30","temp_note":"Short secondary for rosé — preserve freshness, not develop complexity. Keep cool (14–20°C). Rosé secondary is shorter than red: do not over-condition."},{"id":"lo-fi-rose-phase-5","journey_id":"lo-fi-rose","phase_number":5,"name":"Clearing","label":"Clearing · Days 29–40","day_range":"Days 29–40","color_hex":"#378ADD","temp_note":"Cool clearing keeps colour bright and aromatics fresh. A little haze is acceptable. A lot of haze needs attention. Keep 12–20°C, completely undisturbed."},{"id":"lo-fi-rose-phase-6","journey_id":"lo-fi-rose","phase_number":6,"name":"Bottle young","label":"Bottle young · Days 41–50","day_range":"Days 41–50","color_hex":"#c4a96b","temp_note":"Rosé is for drinking young. Bottle and move straight to the fridge. Singapore storage: wine fridge or regular fridge at 8–12°C. Do not store at room temperature."},{"id":"cabernet-sauvignon-phase-1","journey_id":"cabernet-sauvignon","phase_number":1,"name":"Prep","label":"Prep · Day 0","day_range":"Day 0","color_hex":"#5DCAA5","temp_note":"Bring juice to 20–22°C before adding Campden. Record starting temperature. Cabernet has thicker skins and higher tannin — temperature during prep matters for wild yeast activity."},{"id":"cabernet-sauvignon-phase-2","journey_id":"cabernet-sauvignon","phase_number":2,"name":"Primary fermentation","label":"Primary fermentation · Days 1–10","day_range":"Days 1–10","color_hex":"#EF9F27","temp_note":"Cab benefits from the higher end of the range (22–25°C). Thick skins extract colour and tannin better with warmth. Singapore aircon set to 23°C is ideal."},{"id":"cabernet-sauvignon-phase-3","journey_id":"cabernet-sauvignon","phase_number":3,"name":"Press / rack","label":"Press / rack · Days 10–14","day_range":"Days 10–14","color_hex":"#7F77DD","temp_note":"Brief transitional phase. Room temperature 18–24°C is fine. Minimise oxygen exposure during racking. Move carefully."},{"id":"cabernet-sauvignon-phase-4","journey_id":"cabernet-sauvignon","phase_number":4,"name":"Secondary fermentation","label":"Secondary fermentation · Days 15–35","day_range":"Days 15–35","color_hex":"#D85A30","temp_note":"Long, quiet phase. Keep 16–22°C consistently. Tannins integrate better at 18–20°C. Avoid temperature swings — consistency matters more than exact number."},{"id":"cabernet-sauvignon-phase-5","journey_id":"cabernet-sauvignon","phase_number":5,"name":"Clearing & stabilising","label":"Clearing & stabilising · Days 36–55","day_range":"Days 36–55","color_hex":"#378ADD","temp_note":"Cooler helps Cabernet tannins settle and fining to work. Move to coolest room available (14–22°C). Do not disturb once fining agent is added."},{"id":"cabernet-sauvignon-phase-6","journey_id":"cabernet-sauvignon","phase_number":6,"name":"Conditioning","label":"Conditioning · Days 56–90","day_range":"Days 56–90","color_hex":"#c4a96b","temp_note":"Cabernet needs longer conditioning than Shiraz. Wine fridge at 15°C is ideal — slightly warmer than Shiraz conditioning (12°C). Tannin integration works better at 15°C. 4–6 weeks minimum."},{"id":"apartment-white-phase-1","journey_id":"apartment-white","phase_number":1,"name":"Prep","label":"Prep · Day 0","day_range":"Day 0","color_hex":"#5DCAA5","temp_note":"Cool the juice BEFORE starting — place carboy in a water bath for 2 hours. Target 16–18°C before adding Campden. White wine aromatics begin degrading above 22°C."},{"id":"apartment-white-phase-2","journey_id":"apartment-white","phase_number":2,"name":"Primary fermentation","label":"Primary fermentation · Days 1–14","day_range":"Days 1–14","color_hex":"#EF9F27","temp_note":"MOST CRITICAL PHASE. Above 22°C your white will taste flat and solventy — the fresh citrus aromatics are permanently lost. Use a water bath with ice packs changed twice daily. Singapore: 14–20°C mandatory."},{"id":"apartment-white-phase-3","journey_id":"apartment-white","phase_number":3,"name":"First rack","label":"First rack · Days 14–18","day_range":"Days 14–18","color_hex":"#7F77DD","temp_note":"Quick, careful transition (14–20°C). Keep cool throughout. Minimise oxygen exposure — white wine oxidises faster than red."},{"id":"apartment-white-phase-4","journey_id":"apartment-white","phase_number":4,"name":"Clearing","label":"Clearing · Days 19–32","day_range":"Days 19–32","color_hex":"#D85A30","temp_note":"White wine clears faster in a cool environment (12–20°C). Wine fridge or coolest room. Crystal clarity makes the finished wine look and taste better."},{"id":"apartment-white-phase-5","journey_id":"apartment-white","phase_number":5,"name":"Stabilising","label":"Stabilising · Days 33–38","day_range":"Days 33–38","color_hex":"#378ADD","temp_note":"Protect the fresh aromatics by keeping cool (12–20°C) and covered. White wine is more vulnerable to oxidation than red at this stage."},{"id":"apartment-white-phase-6","journey_id":"apartment-white","phase_number":6,"name":"Bottle & chill","label":"Bottle & chill · Days 39–45","day_range":"Days 39–45","color_hex":"#c4a96b","temp_note":"Bottle at room temperature, then move straight to wine fridge or regular fridge. White wine stores and improves at 8–12°C. In Singapore, never store white wine at room temperature."}],"steps":[{"id":"beginners-shiraz-step-01","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-1","step_number":1,"day_label":"Day 0","tagline":"Boring but it saves the wine.","title":"Sanitise everything","instruction":"Wash your carboy, airlock, bung, spoon, hydrometer tube and funnel with hot soapy water. Rinse thoroughly. Then make a sanitising solution — one Campden tablet dissolved in 500ml cold water — and slosh it around every piece of equipment, including the inside of both carboys. Let it drip-dry. Don't towel dry. Yes, all of it. Yes, really. (Campden solution is one option — StarSan or iodophor are no-rinse alternatives, gentler if you're sulphite-sensitive.)","coach_message":"We know. You want to make wine, not do dishes. But here's the truth: more first batches are ruined by dirty equipment than by anything the winemaker actually did wrong. Twenty minutes of sanitising now = six bottles of drinkable wine later. You're welcome.","why_text":"Wild bacteria and rogue yeasts live on every surface you can name. If they get into your juice before your chosen yeast does, they'll make something closer to salad dressing. Sanitising clears the playing field.","warning_text":"Don't rinse with hot water after the Campden soak — heat breaks down the sulphite. Cold rinse only. Or just leave it to drip. Dripping is fine. Towels are not.","celebration_text":"","timer_label":"45 min","temp_instruction":"","is_milestone":false},{"id":"beginners-shiraz-step-02","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-1","step_number":2,"day_label":"Day 0","tagline":"Tells the truth when bubbles lie.","title":"Take your starting gravity","instruction":"Pour a sample of your Shiraz juice into the hydrometer tube — about 3/4 full. Float the hydrometer in it. Read the number at the liquid surface. Write it down. This is your Original Gravity (OG). Aim for 1.080–1.095 for a proper Shiraz around 12–13% ABV.","coach_message":"The hydrometer is the least glamorous thing in your kit and the most honest. It doesn't care how excited you are. It just tells you how much sugar is in your juice. You'll take this reading again at the very end, and the maths between the two numbers tells you exactly how strong your wine is.","why_text":"Yeast converts sugar into alcohol and CO₂. The OG reading locks in your starting point so you can calculate ABV later. Without it, you're guessing. Guessing is for pub quizzes, not winemaking.","warning_text":"Read the hydrometer at eye level — not from above. Parallax error is real and will give you a wrong number. Crouch down. The wine is worth it.","celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"beginners-shiraz-step-03","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-1","step_number":3,"day_label":"Day 0","tagline":"The bouncer at the door.","title":"Add the Campden tablet","instruction":"Crush one Campden tablet finely — the back of a spoon works perfectly. Dissolve it in a small splash of warm water, then stir it into your 6 litres of Shiraz juice. Cover the carboy with a cloth (not the airlock — not yet). Leave it alone for 24 hours at room temperature.","coach_message":"Think of it as sending everyone home before the real party starts. Tomorrow, your chosen yeast arrives. Today, everyone else gets evicted.","why_text":"Wild yeasts in the juice will ferment your wine if given the chance — except their version tastes thin and wrong. The sulphite neutralises them. Your yeast, added tomorrow, walks into a clean room.","warning_text":"The 24-hour wait is non-negotiable. Add your wine yeast too soon and the sulphite kills it too. Wait the full day.","celebration_text":"","timer_label":"24 hours","temp_instruction":"","is_milestone":false},{"id":"beginners-shiraz-step-04","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-1","step_number":4,"day_label":"Day 0","tagline":"Clears things up before they get complicated.","title":"Add pectic enzyme","instruction":"At the same time as your Campden tablet, stir in half a teaspoon of pectic enzyme. It works overnight on the same 24-hour clock — no extra waiting. Two jobs, one overnight shift.","coach_message":"Pectic enzyme sounds like something a scientist invented to ruin a party. It's actually the opposite — it quietly breaks down pectin in your juice so your wine can clear properly later. No enzyme now = mysterious haze later.","why_text":"Pectin is a naturally occurring compound in fruit that causes haze in finished wine — the same stuff that makes jam set. Pectic enzyme breaks it down so it can be removed during clearing.","warning_text":null,"celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"beginners-shiraz-step-05","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-2","step_number":5,"day_label":"Day 1","tagline":"The moment everything actually starts.","title":"Pitch the yeast","instruction":"Sprinkle the yeast over the surface of the juice. Do not stir yet. Leave it for 15 minutes to rehydrate on the surface — it needs to wake up gently. After 15 minutes, stir gently with a sanitised spoon. Fit the airlock half-filled with water into the carboy bung and push it in firmly. Step back.","coach_message":"You just introduced living organisms into your juice and politely asked them to eat all the sugar and make alcohol in return. This is, genuinely, farming. Tiny, boozy farming. Welcome to primary fermentation.","why_text":"Dry yeast cells need to rehydrate before they're metabolically active. Pouring them directly into cold juice causes osmotic shock — many cells die. The 15-minute surface rest is the difference between a healthy fermentation and a troubled one.","warning_text":null,"celebration_text":"That's it. The yeast is in. Primary fermentation has started and there is now no going back. Which is fine. This is going to work.","timer_label":"15 min surface rest","temp_instruction":"Check the temperature of your juice BEFORE opening the yeast sachet. It needs to be 20–24°C. Too cold and the yeast wakes up confused and slow. Too hot and it never wakes up at all. Use your thermometer. This takes 10 seconds and it matters.","is_milestone":true},{"id":"beginners-shiraz-step-06","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-2","step_number":6,"day_label":"Days 2-3","tagline":"Proof that something good is happening.","title":"Watch for airlock activity","instruction":"Check your airlock. Within 12–48 hours of adding the yeast, you should see bubbles moving through the water — slow at first, then picking up pace. If you see regular bubbling: perfect, do nothing. If you see nothing at 48 hours: open the troubleshooter.","coach_message":"Watching your airlock bubble for the first time is one of the quiet joys of home winemaking. You made this happen. That bubble is yours. Every single one of them is alcohol being made in real time. Enjoy it.","why_text":"CO₂ is a by-product of alcoholic fermentation. The airlock allows this gas to escape without letting oxygen or bacteria back in. Bubbling equals fermentation.","warning_text":"No bubbles after 48 hours? Check the bung is firmly seated — loose bungs let gas escape around the seal rather than through the airlock. Press firmly and check in 6 hours.","celebration_text":"","timer_label":"Watch for 48 hrs","temp_instruction":"","is_milestone":false},{"id":"beginners-shiraz-step-07","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-2","step_number":7,"day_label":"Day 3","tagline":"Snacks for the tiny workforce.","title":"Add yeast nutrient","instruction":"Remove the airlock. Add 1 level teaspoon of yeast nutrient directly to the fermenting wine. Stir gently — the fermentation may bubble vigorously for a moment as CO₂ is released. That's fine. It's not going wrong, it's just surprised. Replace the airlock. Done.","coach_message":"Your yeast has been working hard for three days and the juice can be low in the nitrogen yeast actually needs to stay healthy. Yeast nutrient is the packed lunch. A well-fed yeast finishes the job. An underfed one sulks, slows down, and makes the wine smell funny.","why_text":"Stuck fermentation — where yeast stops before all sugar is converted — is most often caused by nutrient deficiency. Adding nutrient at Day 3 powers it through to a complete fermentation.","warning_text":null,"celebration_text":"","timer_label":"","temp_instruction":"Check your room temperature right now. It should be 20–24°C. If your aircon turned off overnight or the room warmed up, this is your highest-risk window. The yeast is most active and most vulnerable in the first 48 hours.","is_milestone":false},{"id":"beginners-shiraz-step-08","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-2","step_number":8,"day_label":null,"tagline":"Checking in on the chaos.","title":"First gravity reading","instruction":"Use a sanitised wine thief or turkey baster to draw a sample. Fill your hydrometer tube, float the hydrometer, read the number. Write it down alongside your OG. At Day 7 expect the SG to be around 1.040–1.060. A big drop from your OG means the yeast is working beautifully.","coach_message":"This is your first proper check-in with the wine. The number should have dropped — sometimes dramatically. Resist the urge to taste it. Fine, have a tiny taste. It'll be rough and yeasty. That's normal. It's not finished.","why_text":"Gravity drops as sugar converts to alcohol. Tracking the drop tells you the rate of fermentation and flags anything slowing unexpectedly.","warning_text":"Always use a sanitised wine thief. Every unsanitised dip rolls the dice on bacteria.","celebration_text":"","timer_label":"","temp_instruction":"Quick temperature check before adding the nutrient. Room still at 20–24°C? Good. A sudden temperature change at this stage — when the yeast population is at its peak — is the fastest way to trigger off-flavour production. Keep it stable.","is_milestone":false},{"id":"beginners-shiraz-step-09","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-2","step_number":9,"day_label":"Day 10","tagline":"The sniff test. Trust your nose.","title":"Check colour and smell","instruction":"Draw a small sample. Hold it up to a light — a phone torch pointed through the glass works brilliantly. It should be deep ruby-purple and completely cloudy (cloudiness is yeast in suspension — it clears later). Give it a proper smell. Looking for: dark fruit with a bready, yeasty warmth underneath.","coach_message":"Your first real smell of something that is genuinely, undeniably wine. It won't smell like a finished Barossa Shiraz yet — it'll smell like a promising grape juice that knows what it wants to be when it grows up. That's exactly right.","why_text":"Smell is the earliest diagnostic tool in winemaking. Wine going wrong usually smells wrong before anything else changes.","warning_text":"If it smells sharp, sour, or like cleaning products — open the troubleshooter immediately. Not in a few days. Now.","celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"beginners-shiraz-step-10","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-2","step_number":10,"day_label":"Day 14","tagline":"The quiet after the storm.","title":"Confirm end of primary fermentation","instruction":"Take a gravity reading. Then take another one 24 hours later. If both are at or below 1.010 — and match each other — primary fermentation is complete. The airlock should have slowed to near-nothing. If not there yet, give it 3 more days and check again.","coach_message":"Two readings, same number, two days in a row. That's confirmation. One low reading is a teaser. Two matching low readings is a fact. Your wine has done the heavy work.","why_text":"Two readings on consecutive days confirm the process is genuinely stable — not just temporarily slowed. Two identical readings below 1.010 mean it's done.","warning_text":"If SG is still above 1.010 after Day 14 and hasn't moved in 48 hours, that's stuck fermentation. Don't rack yet. Open the troubleshoote","celebration_text":"Primary fermentation: complete. The juice is now wine. Rough, young, in-progress wine — but wine. You made alcohol from sugar and yeast and the nerve to try.","timer_label":"Two readings 24 hrs apart","temp_instruction":"Log the room temperature alongside your SG reading — both matter. Temperature affects how fast fermentation moves. A slow gravity drop at 20°C is normal. A slow gravity drop at 24°C means something else is going on. Always record both numbers together.\n","is_milestone":true},{"id":"beginners-shiraz-step-11","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-3","step_number":11,"day_label":"Day 15","tagline":"Moves wine without stirring the drama.","title":"First rack — leave the mess behind","instruction":"Set your clean, sanitised second carboy on the floor (lower than the first). Using your sanitised siphon tube, carefully siphon the wine from the first carboy into the second. Keep the tube below the surface to avoid splashing. Stop before you reach the sediment at the bottom. Leave that behind. Fit the airlock.","coach_message":"The siphon is your most elegant tool. No pumping, no drama, no stirring up all the muck at the bottom — just gravity pulling clear wine from one carboy to another while the spent yeast stays where it belongs.","why_text":"The sediment is lees — spent yeast cells and grape solids. Leaving wine on thick lees too long causes autolysis, where dead yeast breaks down and releases bitter, rubbery compounds.","warning_text":"A little sediment in the siphon is fine. Just stop before you suck up the main lees layer.","celebration_text":"","timer_label":"30 min","temp_instruction":"","is_milestone":false},{"id":"beginners-shiraz-step-12","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-3","step_number":12,"day_label":"Day 15","tagline":"No air, no drama.","title":"Top up the carboy","instruction":"After racking, your carboy will have a gap at the top where the lees volume used to be. Top it up using similar Shiraz juice, a splash of water, or a drop of previously made wine — enough to bring the carboy level to within 2–3cm of the bung. A full carboy is a happy carboy.","coach_message":"The air gap at the top is the enemy now. Oxygen getting in at this stage will turn your wine flat, brown, and sad. Top it up. Tuck it in. Give it no excuses.","why_text":"Without active fermentation producing CO₂, headspace means oxygen exposure. Oxygen oxidises wine — turning it flat and causing browning.","warning_text":null,"celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"beginners-shiraz-step-13","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-3","step_number":12.5,"day_label":"Day 15","tagline":"A barrel, but make it pocket-sized.","title":"Add oak chips to secondary","instruction":"Rinse 12–24g of medium toast oak chips or cubes with boiling water for 1 minute. Drain thoroughly. Drop them directly into your carboy of racking wine. They'll sink to the bottom and get to work immediately. Make a note of the date — you'll start tasting in 5 days.","coach_message":"\"Real wineries use 225-litre French oak barrels that cost $1,500 each. You're using chips that cost $4 from the homebrew shop. The result is closer than anyone would admit in polite company.\"","why_text":"Oak adds compounds called lactones, vanillin, and ellagitannins to your wine — the source of vanilla, toast, cedar, and spice notes in commercial reds. It also softens tannins through micro-oxygenation and adds structural complexity that makes a wine taste \"finished\" rather than just fermented.","warning_text":"Taste every 5–7 days. Oak is cumulative — it keeps giving even after you think you've got enough. Pull it out (by racking) before it tips from \"oaky\" into \"chewing a fence post.\"","celebration_text":"","timer_label":"Taste check every 5–7 days","temp_instruction":"","is_milestone":false},{"id":"beginners-shiraz-step-14","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-3","step_number":13,"day_label":"Day 21","tagline":"Slow is good. Slow is right.","title":"Check secondary fermentation","instruction":"Take a gravity reading. It should be between 1.000 and 1.010. The airlock might bubble once every few minutes. Give the wine a gentle swirl and smell — the bready yeast character should be fading and something more wine-like coming through. If right, close it back up and leave it alone.","coach_message":"Secondary fermentation is so slow and quiet it feels like nothing's happening. Everything is happening. The wine is calming down, the flavours are integrating, the last sugars are being converted. It just doesn't make a fuss about it.","why_text":"Secondary fermentation converts remaining sugars at a much gentler pace and allows harsh compounds to soften. Patience here is repaid directly in the glass.","warning_text":null,"celebration_text":"","timer_label":"","temp_instruction":"If primary fermentation has not finished (SG still above 1.010 after 14 days), check the temperature FIRST before anything else. A room that has dropped below 18°C is the single most common cause of stuck fermentation. The fix is simple — warm it back up.","is_milestone":false},{"id":"beginners-shiraz-step-15","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-3","step_number":14,"day_label":"Day 28","tagline":"The maths that make it official.","title":"Confirm fermentation is complete","instruction":"Take two gravity readings 24 hours apart. If both sit at 0.998–1.002 and match each other, fermentation is complete. Calculate your ABV: (OG minus FG) × 131.25. An OG of 1.090 and FG of 0.998 = 12.1% ABV. Write it on everything.","coach_message":"12.1%. Or 12.4%. Or 13.0%. Whatever your number is — it's yours. Calculate it, write it in your brew log, and put it on your Vintage Card. You've earned the right to tell people exactly how strong your wine is.","why_text":"Two stable matching readings confirm the yeast has genuinely finished rather than just paused. Final Gravity below 1.005 is considered fully dry.","warning_text":"FG still above 1.010? Don't bottle and hope. A wine with residual sugar and live yeast will re-ferment in the bottle. Use the troubleshooter.","celebration_text":"Fermentation done. ABV calculated. Your Shiraz has arrived at itself. Everything from here is about making it as good as it can be.","timer_label":"Two readings 24 hrs apart","temp_instruction":"","is_milestone":true},{"id":"beginners-shiraz-step-16","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-4","step_number":15,"day_label":"Day 29","tagline":"The lock on the door.","title":"Stabilise with Campden tablet","instruction":"Crush one Campden tablet and dissolve in a small amount of cold water. Stir it gently into your finished wine. This isn't about fermentation anymore — it's about protection.","coach_message":"Your wine just crossed the finish line of fermentation. The Campden tablet keeps it safe now that the CO₂ armour is gone. Low intervention, maximum protection.","why_text":"Active fermentation produced CO₂ that shielded wine from oxygen. That's over now. Free SO₂ from the Campden tablet takes over as protector.","warning_text":null,"celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"beginners-shiraz-step-17","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-4","step_number":16,"day_label":"Day 30","tagline":"Works quietly while you do nothing.","title":"Add fining agent","instruction":"Vegan? Use Bentonite — dissolve ¼ teaspoon in warm water, stir into wine. Not vegan? Isinglass or Chitosan work beautifully — follow the packet. Stir gently, refit the airlock, put the carboy somewhere it won't be moved for 7–10 days. Resist all urges to check.","coach_message":"Fining agents work like a magnet for the tiny suspended particles making your wine look like grape cordial. They grab the haze, get heavy together, and sink gracefully to the bottom. Your job is to do nothing. Not nothing-ish. Nothing.","why_text":"Haze in wine is caused by tiny proteins, tannins, and residual yeast. Fining agents carry an opposite electrical charge — they attract the particles, clump together, get heavy enough to sink, and take the haze with them.","warning_text":"Don't move the carboy during fining. Every vibration disturbs the forming sediment and resets the clock.","celebration_text":"","timer_label":"7–10 days","temp_instruction":"","is_milestone":false},{"id":"beginners-shiraz-step-18","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-4","step_number":16.5,"day_label":"Day 22 - 34","tagline":"When to say when.","title":"Oak taste check — rack when ready","instruction":"Draw a small sample. Taste it properly. Are you getting vanilla, a hint of toast, maybe a little spice behind the fruit? If yes — you're there. Rack the wine off the oak chips into your clean sanitised carboy, leaving the chips behind. If you want more — give it another 5 days and taste again.","coach_message":"\"This is the most personal decision you'll make in this whole journey. Nobody can tell you when it's enough oak — only your palate can. Trust it. Write down what you tasted. That note is the beginning of your winemaking philosophy.\"","why_text":"Oak contact time directly controls oak intensity. Short contact (7–10 days) gives subtle background complexity. Longer contact (3–4 weeks) gives prominent oak character. Both are valid — it depends entirely on the style of wine you want to make.","warning_text":"If it tastes like vanilla extract or pencil shavings, you've gone too long. Rack immediately. The oak flavour will mellow slightly in the bottle but won't disappear. Less is genuinely more here.\n","celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"beginners-shiraz-step-19","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-4","step_number":17,"day_label":"Day 38","tagline":"The jewel-check.","title":"Check clarity","instruction":"Hold your carboy up to a phone torch or bright lamp. The light should pass clearly through the wine — deep ruby red, clean light visible, with distinct sediment at the bottom. If it's still hazy, give it another 4–5 days. If it's clear: you're ready.","coach_message":"The moment you hold your carboy to the light and see it come through as deep clear ruby is genuinely one of the best moments in home winemaking. It looks like an actual bottle of Shiraz. Because it is one.","why_text":"Visual clarity means fining has done its job. A clear wine has better mouthfeel, longer shelf life, and looks professional in the bottle.","warning_text":null,"celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"beginners-shiraz-step-20","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-4","step_number":18,"day_label":"Day 40","tagline":"Clean wine deserves a clean home.","title":"Second rack — off the fining sediment","instruction":"Rack your wine one more time into a freshly sanitised carboy, leaving the fining agent sediment behind. This sediment is looser and fluffier than lees — treat it more gently. Slow siphon, minimal disturbance.","coach_message":"This is the rack where you see the finished article for the first time. Clear, bright, deep red wine moving from one carboy to another. You will feel extremely competent at this point. You should. This is what competence looks like.","why_text":"Fining agent sediment left too long strips desirable flavour compounds. Racking at Day 40 preserves the wine's character while removing the clarification residue.","warning_text":"The fining sediment is much more fragile than lees — it resuspends easily. Rack extremely slowly.","celebration_text":"","timer_label":"30 min","temp_instruction":"","is_milestone":false},{"id":"beginners-shiraz-step-21","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-5","step_number":19,"day_label":"Day 43-53","tagline":"Good things happen slowly and quietly.","title":"Cold conditioning\n","instruction":"Move your carboy somewhere cool — a garage, utility room, anywhere consistently around 10–14°C. Leave it undisturbed for 7–10 days. Tartrate crystals may form (tiny glass-like fragments — harmless, tasteless, a sign of a well-made wine).","coach_message":"This is the step most beginners skip. This is also the step that separates a good wine from a great one. Cold conditioning is where the rough edges smooth out and the wine decides what it wants to be. Leave. It. Alone.","why_text":"Cold temperatures cause tartaric acid to crystallise and drop out, removing risk of in-bottle crystallisation later. Cold conditioning also drops remaining protein haze.","warning_text":"Don't put it somewhere below 4°C. Freezing is not conditioning. A cool garage is perfect. A freezer is not.","celebration_text":"","timer_label":"7–10 days","temp_instruction":"Secondary fermentation is slow and quiet and easy to neglect. Keep the temperature consistent at 18–22°C. Any sudden temperature drop can stall the final sugar conversion.","is_milestone":false},{"id":"beginners-shiraz-step-22","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-5","step_number":20,"day_label":"Day 53","tagline":"Trust your palate. It knows things.","title":"Final taste and adjust","instruction":"Rack one final time off any tartrate crystals. Now pour a proper glass. Smell it first — fruit, structure, any off-notes? Taste it. Is it sharp? Flat? Does it taste like something you'd want more of? Add small amounts of tartaric acid (if flat) or wine tannin (if thin) — only if clearly needed.","coach_message":"This is the moment winemaking gets personal. The science is done. The rest is your palate. Trust what you taste. If it tastes good — and it probably does — it is good. Write down what you'd do differently. That's Batch #002 being planned in real time.","why_text":"Minor adjustments to finished wine are legitimate. But most beginner Shiraz wines need nothing — the variety is naturally structured and generous. Taste first, adjust only if clearly needed.","warning_text":"Add a little, wait 24 hours, taste again. You can always add more. You cannot take it out.","celebration_text":"","timer_label":"30 min","temp_instruction":"","is_milestone":false},{"id":"beginners-shiraz-step-23","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-6","step_number":21,"day_label":"Day 56","tagline":"The ceremony before the glory.","title":"Sanitise bottles for bottling day","instruction":"Wash your six bottles, corker, and all siphon equipment with hot soapy water. Rinse well. Make a fresh Campden solution — one tablet in 500ml cold water — and rinse each bottle individually. Leave to drain upside down. Get your Vintage Card ready. Bottling day is a ritual.","coach_message":"Bottling day is the day you stop being someone who made wine and start being someone who has wine. On a shelf. With a label. That's a different kind of person. A better kind, arguably.","why_text":"Bottle cleanliness is the last line of defence. Any residue or bacteria in a bottle will affect the wine as it conditions over coming weeks.","warning_text":"Never use a bottle that previously held dishwasher detergent. Surfactants survive rinsing and will flatten your wine.","celebration_text":"","timer_label":"1 hour","temp_instruction":"","is_milestone":false},{"id":"beginners-shiraz-step-24","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-6","step_number":22,"day_label":"Day 56","tagline":"Six bottles. Six moments of proof.","title":"Bottle your wine","instruction":"Siphon your wine from the carboy into your sanitised bottles, filling each to within 2cm of where the cork will sit. Cork each bottle firmly with your corker. Stand them upright for 24 hours to let the cork seal, then lay them on their sides.","coach_message":"Each bottle you fill is a small act of confidence. The fact that it came from your kitchen and not a winery in the Barossa doesn't make it any less real. It makes it better.","why_text":"The 2cm headspace allows the cork to compress properly. Standing upright 24 hours gives the cork time to seat against the glass. Laying on sides keeps the cork moist.","warning_text":"Work quickly once bottling starts — don't leave the carboy open between bottles.","celebration_text":"","timer_label":"1-2 hours","temp_instruction":"Bring your wine to room temperature (20–24°C) BEFORE you start bottling. If it's coming straight from cold conditioning at 12°C, leave it in your air-conditioned room for 1–2 hours first. Cold wine is viscous and harder to siphon cleanly. The headspace calculation also changes at different temperatures.","is_milestone":false},{"id":"beginners-shiraz-step-25","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-6","step_number":23,"day_label":"Day 57","tagline":"The label that says: I made this.","title":"Apply your Vintage Card label","instruction":"Stick your Glug Plonk Vintage Card label on each bottle. It carries your winery name, batch name, vintage year, variety, ABV, and your tasting notes — everything that makes this bottle yours and no one else's. Apply it straight. Take a photo of the first labelled bottle.","coach_message":"This label is the evidence. It says this wine exists, you made it, and here are the facts. Stick it on. Stand back. Be briefly, quietly, magnificently proud.","why_text":null,"warning_text":null,"celebration_text":"Batch #001: labelled, bottled, and in the rack. You are now, officially and without question, a winemaker. A small winemaker with six bottles and a large amount of satisfaction — but a winemaker.","timer_label":"","temp_instruction":"","is_milestone":true},{"id":"beginners-shiraz-step-26","journey_id":"beginners-shiraz","phase_id":"beginners-shiraz-phase-6","step_number":24,"day_label":"Day 60+","tagline":"The hardest step. Do it anyway.","title":"Wait — then open the first bottle","instruction":"Your wine needs at least 4 weeks in the bottle before it's ready. It will be noticeably better at 8 weeks. When the time comes: open slowly, pour into a decanter or jug, rest for 20 minutes, then pour into a proper glass. Smell it before you drink it. Then drink it. Then tell someone you made it.","coach_message":"Patience is the final ingredient.","why_text":"Bottle shock is real — wine goes quiet and muted immediately after bottling. A few weeks of rest allows everything to reintegrate. Every week makes it better.","warning_text":null,"celebration_text":"You did it. Batch #001 is complete. Pour the first glass. Taste it properly. Write down what you'd do differently. Then open Glug Plonk and start planning Batch #002. The only thing better than one batch of wine is the next one.","timer_label":"4–6 weeks","temp_instruction":"","is_milestone":true},{"id":"kit-shiraz-s01","journey_id":"kit-shiraz","phase_id":"kit-shiraz-phase-1","step_number":1,"day_label":"Day 0","tagline":"No clean, no gluggable wine.","title":"Sanitise everything","instruction":"Wash carboy, airlock, bung, spoon, hydrometer tube and funnel. Rinse with Campden solution (one tablet in 500ml water). Let drip-dry. (Campden solution is one option — StarSan or iodophor are no-rinse alternatives, gentler if you're sulphite-sensitive.)","coach_message":"The factory sorted the juice. You sort the gear.","why_text":"Kit concentrate is sterile — but your equipment is not.","warning_text":"Don't towel dry — towels carry microbes.","celebration_text":"","timer_label":"45 min","temp_instruction":"","is_milestone":false},{"id":"kit-shiraz-s02","journey_id":"kit-shiraz","phase_id":"kit-shiraz-phase-1","step_number":2,"day_label":"Day 0","tagline":"The whole batch in one pour.","title":"Mix concentrate with water","instruction":"Pour concentrate into your sanitised carboy. Fill to 6 litres with water at 20–22°C. Stir thoroughly for 2 minutes until fully blended.","coach_message":"The magic is already in the bottle. You're just waking it up with water.","why_text":"Concentrate is grape juice with water removed under vacuum at low temperature, preserving flavour compounds.","warning_text":"Use water at 20–22°C — cold water dissolves concentrate poorly.","celebration_text":"","timer_label":"15 min","temp_instruction":"Water temperature matters. 20–22°C is ideal for both dissolving and pitching.","is_milestone":false},{"id":"kit-shiraz-s03","journey_id":"kit-shiraz","phase_id":"kit-shiraz-phase-1","step_number":3,"day_label":"Day 0","tagline":"No waiting. Straight in.","title":"Take gravity and pitch yeast — same day","instruction":"Take your OG reading (target 1.070–1.082). Sprinkle yeast on the surface, wait 15 minutes, stir gently, fit the airlock. No 24-hour wait needed.","coach_message":"Fresh juice needs a bouncer before the yeast. Concentrate already handled its own security.","why_text":"Concentrate is heat-pasteurised — all wild yeasts eliminated during production. No 24-hour wait required.","warning_text":"Do not skip the OG reading — it is still your ABV anchor.","celebration_text":"The yeast is in. No Campden wait. This is going to work.","timer_label":"15 min","temp_instruction":"Must be 20–22°C before pitching.","is_milestone":true},{"id":"kit-shiraz-s04","journey_id":"kit-shiraz","phase_id":"kit-shiraz-phase-2","step_number":4,"day_label":"Days 1–2","tagline":"Proof of life.","title":"Watch for airlock activity","instruction":"Check your airlock. Expect bubbling within 12–36 hours — concentrate ferments faster than fresh juice.","coach_message":"Concentrate kits get going quickly. Don't be surprised if it's already vigorous by tomorrow morning.","why_text":"Reconstituted concentrate provides highly bioavailable sugars — fermentation starts faster.","warning_text":"No bubbles at 48 hours? Check the bung and temperature.","celebration_text":"","timer_label":"Watch 36–48 hrs","temp_instruction":"Room should be 18–22°C.","is_milestone":false},{"id":"kit-shiraz-s05","journey_id":"kit-shiraz","phase_id":"kit-shiraz-phase-2","step_number":5,"day_label":"Day 3","tagline":"Even kits need a packed lunch.","title":"Add yeast nutrient","instruction":"Add 1 level teaspoon of yeast nutrient. Stir gently. Refit airlock.","coach_message":"The concentrate provides energy. The nutrient provides vitamins.","why_text":"Even pre-balanced kits can be low in yeast-available nitrogen. Nutrient at Day 3 prevents stuck fermentation.","warning_text":null,"celebration_text":"","timer_label":"","temp_instruction":"Still 18–22°C? Good.","is_milestone":false},{"id":"kit-shiraz-s06","journey_id":"kit-shiraz","phase_id":"kit-shiraz-phase-2","step_number":6,"day_label":"Day 5","tagline":"Data today, bragging rights tomorrow.","title":"First gravity reading","instruction":"Draw a sample. Expect SG 1.040–1.060 by Day 5 — concentrate kits ferment faster.","coach_message":"The number dropped faster than you expected. That's normal.","why_text":"Bioavailable sugars in concentrate mean fermentation rate is typically 20–30% faster than fresh juice.","warning_text":"Sanitise your wine thief every time.","celebration_text":"","timer_label":"","temp_instruction":"Log temperature alongside SG — both numbers tell the story.","is_milestone":false},{"id":"kit-shiraz-s07","journey_id":"kit-shiraz","phase_id":"kit-shiraz-phase-2","step_number":7,"day_label":"Day 7","tagline":"The quiet after the fast storm.","title":"Confirm primary done — first rack","instruction":"Two gravity readings 24 hours apart. Both at or below 1.010? Primary done. Rack to clean sanitised carboy.","coach_message":"Seven days. Done. Fresh juice takes fourteen.","why_text":"Two stable readings confirm complete primary fermentation. Racking removes lees before autolysis.","warning_text":"SG above 1.010 at Day 7? Give it 2–3 more days.","celebration_text":"Primary fermentation done. Seven days.","timer_label":"Two readings 24 hrs apart","temp_instruction":"Log temperature with your final primary reading.","is_milestone":true},{"id":"kit-shiraz-s07b","journey_id":"kit-shiraz","phase_id":"kit-shiraz-phase-3","step_number":7.5,"day_label":"Day 8","tagline":"Not gentle swirling. Ten actual minutes.","title":"Degas the wine","instruction":"Before stabilising, degas the wine: stir vigorously with a sanitised spoon (or a degassing paddle on a drill) for a full 10 minutes until no more CO₂ bubbles rise. Kit wines hold dissolved CO₂ that makes the finished wine taste fizzy and sharp if left in.","coach_message":"This is the step kit instructions bury and beginners skip. Ten real minutes of stirring. Your wine will thank you by not tasting like flat soda.","why_text":"Concentrate kits trap dissolved CO₂. Undegassed wine tastes prickly and harsh, and the CO₂ interferes with fining agents doing their job.","warning_text":"Do not over-degas by splashing — you want CO₂ out, not oxygen in. Stir, don't whip.","celebration_text":"","timer_label":"10 min","temp_instruction":"","is_milestone":false},{"id":"kit-shiraz-s08","journey_id":"kit-shiraz","phase_id":"kit-shiraz-phase-3","step_number":8,"day_label":"Day 8","tagline":"Sorbate says: the party is over.","title":"Add stabiliser — potassium sorbate","instruction":"Add the potassium sorbate sachet from your kit. Stir gently into the wine.","coach_message":"Sorbate tells yeast: you're done here. No more budding.","why_text":"Potassium sorbate inhibits yeast reproduction, preventing re-fermentation in bottle.","warning_text":"Do not add sorbate to actively fermenting wine — wait for confirmed FG.","celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"kit-shiraz-s09","journey_id":"kit-shiraz","phase_id":"kit-shiraz-phase-3","step_number":9,"day_label":"Day 8","tagline":"Part one of two. The setup.","title":"Add kieselsol — first fining agent","instruction":"Add the kieselsol sachet (clear or white liquid). Stir vigorously for 60 seconds. Refit airlock.","coach_message":"Negatively charged silica particles looking for something positive to cling to.","why_text":"Kieselsol carries a negative charge and attracts positively charged protein and tannin particles.","warning_text":"Stir thoroughly — kieselsol only works when evenly distributed.","celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"kit-shiraz-s10","journey_id":"kit-shiraz","phase_id":"kit-shiraz-phase-3","step_number":10,"day_label":"Day 9","tagline":"Part two of two. The finish.","title":"Add chitosan — second fining agent","instruction":"Exactly 24 hours after kieselsol, add the chitosan sachet. Stir vigorously 60 seconds. Do not move carboy for 3–5 days.","coach_message":"Chitosan finds kieselsol. They bond, get heavy, sink. Cleared in days, not weeks.","why_text":"Chitosan (positive charge) bonds with kieselsol (negative charge), forming heavy clumps that sink and drag haze with them.","warning_text":"Not vegan? Chitosan is typically shellfish-derived. Vegan alternatives available.","celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"kit-shiraz-s11","journey_id":"kit-shiraz","phase_id":"kit-shiraz-phase-4","step_number":11,"day_label":"Day 12","tagline":"The jewel-check.","title":"Gravity and clarity check","instruction":"Take a gravity reading (target 0.994–1.000). Hold carboy to a phone torch — looking for crystal clear with sediment at the bottom.","coach_message":"Concentrate kits clear faster than fresh juice. Clear by Day 14 is right on schedule.","why_text":"Two-part fining typically clears wine in 3–5 days at room temperature.","warning_text":"Still hazy at Day 14? Check carboy was not moved. Re-fine if needed.","celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"kit-shiraz-s12","journey_id":"kit-shiraz","phase_id":"kit-shiraz-phase-4","step_number":12,"day_label":"Day 14","tagline":"Clean wine deserves a clean home.","title":"Final rack — off the fining sediment","instruction":"Rack carefully into fresh sanitised carboy, leaving fining sediment behind. The sediment is loose — rack slowly.","coach_message":"You'll see the finished article for the first time. Clear, bright, real red wine.","why_text":"Fining sediment left too long strips flavour compounds.","warning_text":"Fining sediment resuspends instantly. Rack extremely slowly.","celebration_text":"","timer_label":"30 min","temp_instruction":"","is_milestone":false},{"id":"kit-shiraz-s13","journey_id":"kit-shiraz","phase_id":"kit-shiraz-phase-5","step_number":13,"day_label":"Day 21","tagline":"The ceremony before the glory.","title":"Sanitise bottles for bottling day","instruction":"Wash six bottles, corker, siphon with soapy water. Rinse each with Campden solution. Drain upside down.","coach_message":"Three weeks in. The bottles are next.","why_text":"Bottle cleanliness is the last line of defence.","warning_text":"Never use bottles that held dishwasher detergent.","celebration_text":"","timer_label":"1 hour","temp_instruction":"Bottle at 20–22°C.","is_milestone":false},{"id":"kit-shiraz-s14","journey_id":"kit-shiraz","phase_id":"kit-shiraz-phase-5","step_number":14,"day_label":"Day 21","tagline":"Six bottles. Done.","title":"Bottle your wine","instruction":"Siphon into sanitised bottles to within 2cm of the cork line. Cork firmly. Stand upright 24 hours, then lay on sides.","coach_message":"Each bottle is a win. Made from a kit. By you. Still counts.","why_text":"2cm headspace allows cork compression. Upright 24 hours lets the cork seal.","warning_text":"Work steadily — don't leave the carboy open between bottles.","celebration_text":"","timer_label":"1–2 hours","temp_instruction":"","is_milestone":false},{"id":"kit-shiraz-s15","journey_id":"kit-shiraz","phase_id":"kit-shiraz-phase-5","step_number":15,"day_label":"Day 22","tagline":"The label that says: I made this.","title":"Apply your Vintage Card label","instruction":"Stick the Glug Plonk Vintage Card label on each bottle. Record batch name, ABV, and date.","coach_message":"Kit or not — this wine came from your kitchen.","why_text":null,"warning_text":null,"celebration_text":"Batch labelled. Kit wine is still wine. Brag about it.","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"kit-shiraz-s16","journey_id":"kit-shiraz","phase_id":"kit-shiraz-phase-5","step_number":16,"day_label":"Day 28+","tagline":"Faster than you thought possible.","title":"Wait — then open the first bottle","instruction":"Wait 2–4 weeks. Concentrate kits drink well younger than fresh juice. Chill slightly, pour, smell first.","coach_message":"Two weeks. Not two months. That is the concentrate advantage.","why_text":"Bottle shock clears faster for kit wines — typically 1–2 weeks vs 3–4 for fresh juice.","warning_text":"Still sharp at 2 weeks? Give it one more week.","celebration_text":"You made wine from a kit. The kit made you a winemaker.","timer_label":"2–4 weeks","temp_instruction":"","is_milestone":true},{"id":"kit-cabernet-premium-s01","journey_id":"kit-cabernet-premium","phase_id":"kit-cabernet-premium-phase-1","step_number":1,"day_label":"Day 0","tagline":"Scale up the sanitising. Scale up the glory.","title":"Sanitise everything — 23L batch","instruction":"Sanitise two carboys, airlock, bung, spoon, hydrometer tube, siphon. Use two Campden tablets in 1L water for 23L-capacity equipment. (Campden solution is one option — StarSan or iodophor are no-rinse alternatives, gentler if you're sulphite-sensitive.)","coach_message":"More wine, same principle.","why_text":"Larger batch volume means more surface area. More thorough sanitising is proportionally more important.","warning_text":"Two tablets minimum for 23L.","celebration_text":"","timer_label":"45 min","temp_instruction":"","is_milestone":false},{"id":"kit-cabernet-premium-s02","journey_id":"kit-cabernet-premium","phase_id":"kit-cabernet-premium-phase-1","step_number":2,"day_label":"Day 0","tagline":"Premium quality. Same starting move.","title":"Mix concentrate and grape skins (if included)","instruction":"Pour concentrate into primary vessel. Add water to 23L at 20–22°C. Stir well. Add grape skins pack now if included. Take OG reading.","coach_message":"Premium kits sometimes include grape skins. They add tannin, colour, and complexity standard kits can't reach.","why_text":"Grape skins provide phenolic compounds — tannins, anthocyanins — giving structure and flavour depth closer to crushed-grape wine.","warning_text":"No grape skins in your kit? Proceed as normal without them.","celebration_text":"","timer_label":"20 min","temp_instruction":"Water at 20–22°C for mixing.","is_milestone":false},{"id":"kit-cabernet-premium-s03","journey_id":"kit-cabernet-premium","phase_id":"kit-cabernet-premium-phase-1","step_number":3,"day_label":"Day 0","tagline":"No Campden. No waiting. Pitch it.","title":"Pitch yeast — same day","instruction":"Sprinkle yeast on surface. Wait 15 minutes. Stir gently. Fit airlock. No 24-hour Campden pre-treatment needed.","coach_message":"Premium kits are still concentrates — still sterile.","why_text":"Premium concentrate undergoes the same sterilisation as standard kits.","warning_text":"Do not add Campden before pitching.","celebration_text":"Premium fermentation starts. Thirty bottles in the making.","timer_label":"15 min","temp_instruction":"Check must is 20–22°C before pitching.","is_milestone":true},{"id":"kit-cabernet-premium-s04","journey_id":"kit-cabernet-premium","phase_id":"kit-cabernet-premium-phase-2","step_number":4,"day_label":"Days 1–2","tagline":"Watch the cap if using grape skins.","title":"Monitor fermentation and punch down","instruction":"If grape skins are floating: push them down gently twice daily with a sanitised spoon. Look for vigorous bubbling within 36 hours.","coach_message":"Grape skins form a cap on top of the must. Punching down keeps them wet and extracts colour and tannin.","why_text":"Punching down (pigeage) is the same technique used in every serious red wine winery.","warning_text":"If using grape skins: punch down at least twice daily.","celebration_text":"","timer_label":"Punch down twice daily","temp_instruction":"Keep 18–22°C. Premium kits reward consistency.","is_milestone":false},{"id":"kit-cabernet-premium-s05","journey_id":"kit-cabernet-premium","phase_id":"kit-cabernet-premium-phase-2","step_number":5,"day_label":"Day 3","tagline":"Premium yeast still needs snacks.","title":"Add yeast nutrient","instruction":"Add 1 level teaspoon of yeast nutrient for a 6L batch, or 2 teaspoons for 23L. Stir through. Refit airlock.","coach_message":"Thirty bottles of Cabernet Sauvignon. The yeast is working hard.","why_text":"Larger volume means more yeast cells. Nutrient demand scales with batch size.","warning_text":null,"celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"kit-cabernet-premium-s06","journey_id":"kit-cabernet-premium","phase_id":"kit-cabernet-premium-phase-2","step_number":6,"day_label":"Day 7","tagline":"Halfway through primary.","title":"Mid-primary gravity check","instruction":"Take gravity reading. Expect 1.040–1.060. If grape skins: taste — colour should be deep ruby. Consider removing skins if desired extraction is reached.","coach_message":"By Day 7 skins should have done most of their extraction work.","why_text":"Extended skin contact increases tannin. Most pull skins at Day 7–10 for balanced tannin.","warning_text":"Taste before pulling skins. Astringent but not harsh is the right call.","celebration_text":"","timer_label":"","temp_instruction":"","is_milestone":false},{"id":"kit-cabernet-premium-s07","journey_id":"kit-cabernet-premium","phase_id":"kit-cabernet-premium-phase-2","step_number":7,"day_label":"Day 10","tagline":"Remove the skins. Keep the wine.","title":"Rack off grape skins + confirm primary","instruction":"Rack wine into second carboy, straining out any grape skins. Take gravity. Repeat 24 hours later. Both at or below 1.010? Primary done.","coach_message":"The skins gave what they had.","why_text":"Grape skins contribute most extractable compounds in the first 7–10 days.","warning_text":"Leave skins behind completely.","celebration_text":"Primary done. Grape skins did their job.","timer_label":"30 min","temp_instruction":"","is_milestone":true},{"id":"kit-cabernet-premium-s07b","journey_id":"kit-cabernet-premium","phase_id":"kit-cabernet-premium-phase-3","step_number":7.5,"day_label":"Day 11","tagline":"Ten minutes. Not swirled. Stirred.","title":"Degas thoroughly","instruction":"Degas the full 23L before stabilising: stir vigorously for 10 minutes, ideally with a degassing paddle on a drill. A batch this size holds a lot of dissolved CO₂ — get it all out before fining.","coach_message":"Twenty-three litres of wine holds twenty-three litres worth of trapped CO₂. Degas properly or your premium Cabernet tastes like premium soda water.","why_text":"Large-volume kit wines hold more dissolved CO₂. Thorough degassing is essential for both taste and effective fining.","warning_text":"Use a degassing paddle for a batch this size — 10 minutes of hand-stirring 23L is genuinely hard work.","celebration_text":"","timer_label":"10 min","temp_instruction":"","is_milestone":false},{"id":"kit-cabernet-premium-s08","journey_id":"kit-cabernet-premium","phase_id":"kit-cabernet-premium-phase-3","step_number":8,"day_label":"Day 11","tagline":"Sorbate says: the party is over.","title":"Add stabiliser
