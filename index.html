<style>
:root{
  --ink:#15110f;--merlot:#5b0f2a;--plum:#6b3a5b;--blush:#e6c7c6;--paper:#f3efe6;
  --paper2:#fffaf0;--lime:#a6b23c;--line:#ded4c3;--muted:#7a6b62;--danger:#b3261e;
  --ok:#3e6f42;--shadow:0 18px 50px rgba(28,16,12,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif;background:#24141d;color:var(--ink);display:flex;justify-content:center;}
#app{width:100%;max-width:430px;height:100dvh;background:var(--paper);position:relative;overflow:hidden;display:flex;flex-direction:column;
background-image:radial-gradient(circle at 10% 10%,rgba(91,15,42,.06),transparent 16%),radial-gradient(circle at 90% 20%,rgba(166,178,60,.08),transparent 18%),linear-gradient(180deg,#fffaf0 0%,#f3efe6 100%);}
button,input,textarea,select{font:inherit}
button{cursor:pointer;-webkit-tap-highlight-color:transparent}
input,textarea,select{width:100%;border:none;outline:none;background:transparent;color:var(--ink)}
::-webkit-scrollbar{width:0;height:0}
.screen{flex:1;overflow-y:auto;padding:18px 18px 110px}
.logo{font-family:Georgia,serif;font-weight:900;letter-spacing:-.055em;line-height:.84}
.display{font-family:Georgia,serif;font-weight:800;letter-spacing:-.035em;line-height:.98}
.hand{font-family:"Comic Sans MS","Bradley Hand",cursive;letter-spacing:.01em}
.micro{font-size:10px;text-transform:uppercase;letter-spacing:.12em;font-weight:800;color:var(--muted)}
.card{background:rgba(255,250,240,.78);border:1px solid var(--line);border-radius:22px;box-shadow:0 10px 26px rgba(45,28,18,.07)}
.btn{border:none;border-radius:999px;padding:15px 18px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;background:var(--merlot);color:#fff;box-shadow:0 12px 30px rgba(91,15,42,.22)}
.btn.alt{background:transparent;color:var(--merlot);border:1.5px solid var(--merlot);box-shadow:none}
.btn.lime{background:var(--lime);color:#231b16}
.chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:6px 10px;font-size:11px;background:#fff7ea;color:var(--ink)}
.chip.on{background:var(--merlot);color:#fff;border-color:var(--merlot)}
.stamp{border:1.5px dashed var(--merlot);border-radius:12px;color:var(--merlot);padding:9px 11px;font-size:11px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;background:rgba(255,250,240,.65)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 8px;flex-shrink:0}
.icon{width:34px;height:34px;border-radius:12px;background:var(--merlot);color:#fff;display:grid;place-items:center;font-family:Georgia,serif;font-weight:900;box-shadow:0 8px 20px rgba(91,15,42,.22)}
.nav{position:absolute;left:12px;right:12px;bottom:12px;height:74px;border-radius:26px;background:rgba(255,250,240,.92);backdrop-filter:blur(14px);border:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);box-shadow:var(--shadow);z-index:30;overflow:hidden}
.nav button{border:none;background:transparent;color:var(--muted);font-size:9px;text-transform:uppercase;font-weight:800;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.nav button .ico{font-size:19px;line-height:1}
.nav button.active{color:var(--merlot)}
.wineRing{position:absolute;width:112px;height:112px;border:8px solid rgba(91,15,42,.18);border-left-color:transparent;border-bottom-color:rgba(91,15,42,.35);border-radius:50%;transform:rotate(-18deg);pointer-events:none}
.bubble{position:absolute;border:1.5px solid rgba(91,15,42,.5);border-radius:50%;pointer-events:none}
.row{display:flex;gap:10px;align-items:center}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fade{animation:fade .36s ease both}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
hr{border:none;border-top:1px solid var(--line);margin:14px 0}
.small{font-size:12px;color:var(--muted);line-height:1.45}
</style>
</head>

function J(id=S.selectedJourney){return DB.journeys.find(j=>j.id===id)||DB.journeys[0];}
function params(id=S.selectedJourney){return DB.wine_parameters.find(p=>p.journey_id===id)||{};}
function phases(id=S.selectedJourney){return DB.phases.filter(p=>p.journey_id===id).sort((a,b)=>n(a.phase_number)-n(b.phase_number));}
function steps(id=S.selectedJourney){return DB.steps.filter(s=>s.journey_id===id).sort((a,b)=>n(a.step_number)-n(b.step_number));}
function ingredients(id=S.selectedJourney){return DB.kit_ingredients.filter(x=>x.journey_id===id).sort((a,b)=>n(a.sort_order)-n(b.sort_order));}
function equipment(id=S.selectedJourney){return DB.kit_equipment.filter(x=>x.journey_id===id).sort((a,b)=>n(a.sort_order)-n(b.sort_order));}
function currentStep(){const st=steps(); const done=S.completed[S.selectedJourney]||0; return st[Math.min(done,st.length-1)]||st[0];}
function currentPhase(){const step=currentStep(); return DB.phases.find(p=>p.id===step?.phase_id)||phases()[0]||{name:'Prep',color_hex:'#a6b23c'};}
function latestReading(){return S.readings.filter(r=>r.journey_id===S.selectedJourney).slice(-1)[0];}
function abv(){const r=S.readings.filter(r=>r.journey_id===S.selectedJourney&&r.sg); if(!r.length)return null; const og=n(S.batch?.og||params().target_og_min||r[0].sg); const fg=n(r[r.length-1].sg); if(!og||!fg||og<=fg)return null; return ((og-fg)*131.25).toFixed(1);}
function statusText(){const p=params(), r=latestReading(); if(!r)return 'Waiting for your first log.'; if(r.temp&&p.min_fermentation_temp_c&&r.temp<p.min_fermentation_temp_c)return 'A little cold. Warm gently.'; if(r.temp&&p.max_fermentation_temp_c&&r.temp>p.max_fermentation_temp_c)return 'Too warm. Cool the chaos.'; if(r.sg && p.target_fg_max && r.sg<=p.target_fg_max)return 'Dry and nearly done.'; return 'Alive and behaving.';}

    <div>
      <div class="micro">${j.difficulty} · ${j.duration_days} days</div>
      <div class="display" style="font-size:24px;margin:5px 0;color:${journeyColors[j.id]||'var(--merlot)'}">${j.name}</div>
      <div class="small">${j.tagline}</div>
    </div>
    <div style="font-size:34px">${emoji[j.id]||'🍷'}</div>
  </div>
</button>`).join('')}
</div>
<button class="btn lime" onclick="surprise()" style="width:100%;margin-top:16px">Not sure yet? Surprise me</button>
</div>`+nav()
}
function surprise(){const j=DB.journeys[Math.floor(Math.random()*DB.journeys.length)];set({selectedJourney:j.id,tab:'overview'})}
function renderOverview(){
const j=J(), p=params(), ing=ingredients(), eq=equipment();
return top(j.name,'Journey overview')+`<div class="screen fade">
<div class="card" style="overflow:hidden;margin-bottom:12px">
 <div style="background:${journeyColors[j.id]||'var(--merlot)'};color:#fff;padding:20px">
  <div style="font-size:40px;margin-bottom:6px">${emoji[j.id]||'🍷'}</div>
  <div class="display" style="font-size:30px">${j.name}</div>
  <p style="font-size:13px;line-height:1.5;margin-top:8px;opacity:.9">${j.description}</p>
 </div>
 <div class="grid2" style="padding:15px">
  <div><div class="micro">Difficulty</div><strong>${j.difficulty}</strong></div>
  <div><div class="micro">Duration</div><strong>${j.duration_days} days</strong></div>
  <div><div class="micro">Expected ABV</div><strong>${j.target_abv}</strong></div>
  <div><div class="micro">Batch</div><strong>${j.batch_size}</strong></div>
 </div>
</div>
<div class="stamp" style="margin-bottom:12px">Perfect for: ${j.tagline}</div>
<div class="grid2" style="margin-bottom:12px">
 <button class="card" onclick="set({showSheet:'ingredients'})" style="padding:14px;text-align:left"><div class="micro">Need</div><div class="display" style="font-size:22px">${ing.length} ingredients</div></button>
 <button class="card" onclick="set({showSheet:'equipment'})" style="padding:14px;text-align:left"><div class="micro">Gear</div><div class="display" style="font-size:22px">${eq.length} tools</div></button>
</div>
<button class="btn" onclick="startBatchPrompt()" style="width:100%">Start this journey</button>
<button class="btn alt" onclick="set({tab:'journeys'})" style="width:100%;margin-top:10px">Back to journeys</button>
${renderSheet()}
</div>`+nav()
}
function startBatchPrompt(){
const j=J(); const name=prompt('Name this batch', `${j.name.replace("Beginner's ","")} ${new Date().getFullYear()}`);
if(name!==null){const og=prompt('Starting gravity / OG (optional)', params().target_og_min||''); set({batch:{name:name||j.name, journey_id:j.id, og:parseFloat(og)||null}, startedAt:new Date().toISOString(), tab:'batch'});}
}
function renderSheet(){
if(!S.showSheet)return '';
const arr=S.showSheet==='ingredients'?ingredients():equipment();
return `<div onclick="set({showSheet:null})" style="position:fixed;inset:0;background:rgba(21,17,15,.45);z-index:40;display:flex;align-items:flex-end">
 <div onclick="event.stopPropagation()" style="background:var(--paper2);border-radius:28px 28px 0 0;max-height:72vh;overflow:auto;padding:20px;width:100%;box-shadow:var(--shadow)">
  <div class="row" style="justify-content:space-between;margin-bottom:12px"><div class="display" style="font-size:26px">${S.showSheet==='ingredients'?'Ingredients':'Equipment'}</div><button class="chip" onclick="set({showSheet:null})">Close</button></div>
  <div style="display:flex;flex-direction:column;gap:10px">${arr.map(x=>`<div class="card" style="padding:12px"><div class="row" style="justify-content:space-between"><strong>${x.name}</strong><span class="chip">${clean(x.quantity)} ${clean(x.unit)}</span></div><div class="small" style="margin-top:5px">${x.description||''}</div><div class="hand" style="color:var(--merlot);font-weight:800;margin-top:6px">${x.cheeky_note||''}</div></div>`).join('')}</div>
 </div></div>`}
function renderBatch(){
if(!S.batch)return renderJourneys();
const j=J(S.batch.journey_id), st=currentStep(), ph=currentPhase(), r=latestReading(), done=S.completed[S.selectedJourney]||0, total=steps().length, pct=Math.round(done/Math.max(1,total)*100);
return top('Your batch is alive','Batch dashboard')+`<div class="screen fade">
<div class="card" style="padding:18px;margin-bottom:12px;position:relative;overflow:hidden">
 <div class="wineRing" style="right:-38px;top:-38px;width:150px;height:150px"></div>
 <div class="micro">${j.name} · Day ${dayNum()}</div>
 <div class="display" style="font-size:34px;margin:6px 0 4px">${S.batch.name}</div>
 <div class="small">Status: <strong style="color:var(--merlot)">${statusText()}</strong></div>
 <div style="height:9px;background:#eadfcd;border-radius:99px;margin:18px 0 8px"><div style="height:9px;width:${pct}%;background:var(--merlot);border-radius:99px"></div></div>
 <div class="row" style="justify-content:space-between"><span class="small">Step ${Math.min(done+1,total)} of ${total}</span><span class="small">${pct}%</span></div>
</div>
<div class="grid2" style="margin-bottom:12px">
 <div class="card" style="padding:14px"><div class="micro">Phase</div><strong>${ph.name}</strong><div class="small">${ph.day_range||''}</div></div>
 <div class="card" style="padding:14px"><div class="micro">Est. ABV</div><strong>${abv()||'—'}${abv()?'%':''}</strong><div class="small">Updates from logs</div></div>
 <div class="card" style="padding:14px"><div class="micro">Last gravity</div><strong>${r?.sg||'—'}</strong></div>
 <div class="card" style="padding:14px"><div class="micro">Temp</div><strong>${r?.temp?r.temp+'°C':'—'}</strong></div>
</div>
<div class="card" style="padding:16px;margin-bottom:12px">
 <div class="micro">Next task</div>
 <div class="display" style="font-size:26px;margin:5px 0">${st?.title||'Vintage card'}</div>
 <p class="small">${st?.tagline||'You made a tiny legend.'}</p>
 <button class="btn" onclick="set({tab:'task'})" style="width:100%;margin-top:12px">Do today’s task</button>
</div>
<div class="row">
 <button class="btn alt" onclick="set({tab:'log'})" style="flex:1">Log reading</button>
 <button class="btn alt" onclick="set({tab:'help'})" style="flex:1">Is it dying?</button>
</div>
</div>`+nav()
}
function renderTask(){
if(!S.batch)return renderJourneys();
const st=currentStep(); if(!st)return renderVintage();
return top('Today’s mission', clean(st.day_label)) + `<div class="screen fade">
<div class="card" style="padding:18px;margin-bottom:12px">
 <div class="micro">${currentPhase().name} · Step ${st.step_number}</div>
 <div class="display" style="font-size:34px;margin:8px 0">${st.title}</div>
 <div class="hand" style="color:var(--merlot);font-size:18px;font-weight:800;margin-bottom:12px">${st.tagline}</div>
 <hr>
 <div class="micro">How to do it</div>
 <p style="font-size:15px;line-height:1.62;margin:7px 0 14px">${st.instruction}</p>
 ${st.why_text?`<div style="background:#fff5df;border-left:5px solid var(--lime);padding:12px;border-radius:12px;margin-bottom:10px"><div class="micro">Why it matters</div><div class="small" style="color:var(--ink);margin-top:4px">${st.why_text}</div></div>`:''}
 ${st.warning_text?`<div style="background:#fff0f1;border:1px solid #e9b4b4;padding:12px;border-radius:12px;margin-bottom:10px"><div class="micro" style="color:var(--danger)">Watch out</div><div class="small" style="color:var(--ink);margin-top:4px">${st.warning_text}</div></div>`:''}
 <div class="stamp">${st.coach_message||'Trust the yeast.'}</div>
</div>
<div class="row">
 <button class="btn" onclick="completeStep()" style="flex:1">Mark complete</button>
 <button class="btn alt" onclick="set({tab:'log'})" style="flex:1">Log first</button>
</div>
<button class="btn alt" onclick="set({tab:'batch'})" style="width:100%;margin-top:10px">I’ll do this later</button>
</div>`+nav()
}
function completeStep(){
const id=S.selectedJourney, total=steps(id).length, cur=S.completed[id]||0; const st=steps(id)[cur];
const completed={...S.completed,[id]:Math.min(cur+1,total)}; 
S.completed=completed; save();
if(cur+1>=total){set({tab:'vintage'})} else if(st?.celebration_text){alert(st.celebration_text); set({tab:'batch'})} else set({tab:'batch'});
}
function renderLog(){
return top('Log the glug','Data today. Legend tomorrow.')+`<div class="screen fade">
<div class="card" style="padding:16px;margin-bottom:12px">
 <div class="grid2" style="margin-bottom:10px">
  <label><div class="micro">Gravity</div><input id="sg" type="number" step="0.001" placeholder="1.070" style="background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px;margin-top:5px"></label>
  <label><div class="micro">Temp °C</div><input id="temp" type="number" step="0.1" placeholder="24.1" style="background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px;margin-top:5px"></label>
 </div>
 <label><div class="micro">Notes</div><textarea id="notes" placeholder="Smells like dark berries and bad decisions." style="background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px;min-height:86px;margin-top:5px"></textarea></label>
 <div class="micro" style="margin:12px 0 7px">Smell tags</div>
 <div id="tags" class="row" style="flex-wrap:wrap;margin-bottom:12px">${['Dark berries','Citrus','Plum','Floral','Yeasty','Eggy','Vinegar','Odd but cute'].map(t=>`<button class="chip" onclick="this.classList.toggle('on')">${t}</button>`).join('')}</div>
 <button class="btn" onclick="saveReading()" style="width:100%">Save reading</button>
</div>
<div style="display:flex;flex-direction:column;gap:10px">${S.readings.filter(r=>r.journey_id===S.selectedJourney).slice().reverse().map(r=>`<div class="card" style="padding:14px"><div class="row" style="justify-content:space-between"><strong>SG ${r.sg||'—'}</strong><span class="small">${r.date}</span></div><div class="small">${r.temp?r.temp+'°C · ':''}${r.tags?.join(', ')||''}</div><div style="margin-top:6px">${r.notes||''}</div></div>`).join('')||'<div class="card" style="padding:24px;text-align:center"><div style="font-size:34px">📊</div><div class="small">No readings yet. Log the glug.</div></div>'}</div>
</div>`+nav()
}
function saveReading(){
const sg=parseFloat(document.getElementById('sg').value)||null, temp=parseFloat(document.getElementById('temp').value)||null, notes=document.getElementById('notes').value.trim();
const tags=[...document.querySelectorAll('#tags .chip.on')].map(x=>x.textContent);
S.readings=[...S.readings,{journey_id:S.selectedJourney,sg,temp,notes,tags,date:new Date().toLocaleDateString('en-SG')}]; save(); set({tab:'batch'});
}
function renderHelp(){
const j=J(), issues=DB.troubleshooting.filter(x=>x.related_wine_type==='all'||x.related_wine_type===params().wine_type_id||x.related_wine_type===j.style?.toLowerCase());
return top('Is my wine dying?','Troubleshooting')+`<div class="screen fade">
<div class="stamp" style="margin-bottom:12px">Bubbles are gossip. Gravity is evidence.</div>
<div style="display:flex;gap:10px;overflow-x:auto;padding-bottom:10px;margin-bottom:10px">
${issues.map(i=>`<button class="card" onclick="showIssue('${i.issue_id}')" style="min-width:145px;padding:14px;text-align:left">
 <div style="font-size:22px;margin-bottom:5px">${i.severity==='High'?'🚨':i.severity==='Medium'?'⚡':'💅'}</div>
 <strong>${i.symptom}</strong><div class="small">${i.coach_copy}</div>
</button>`).join('')}
</div>
<div id="issueDetail" class="card" style="padding:16px">
 <div class="display" style="font-size:26px;margin-bottom:6px">Tap a panic card.</div>
 <p class="small">Glug Plonk will tell you the likely cause, what to do next, and when to actually panic.</p>
</div>
<button class="btn lime" onclick="set({tab:'vintage'})" style="width:100%;margin-top:12px">Preview vintage card</button>
</div>`+nav()
}
function showIssue(id){
const i=DB.troubleshooting.find(x=>x.issue_id===id); if(!i)return;
document.getElementById('issueDetail').innerHTML=`<div class="micro">${i.severity} severity · ${i.related_phase}</div><div class="display" style="font-size:27px;margin:6px 0">${i.symptom}</div><p class="small"><strong>Likely cause:</strong> ${i.likely_cause}</p><hr><p style="font-size:14px;line-height:1.55"><strong>Do this:</strong> ${i.user_action}</p><div class="stamp" style="margin-top:12px">${i.when_to_panic}</div>`;
}
function renderVintage(){
const j=J(), r=latestReading();
return top('Vintage card','Bottle the legend')+`<div class="screen fade">
<div style="background:var(--merlot);color:#fff;border-radius:28px;padding:24px;box-shadow:var(--shadow);position:relative;overflow:hidden">
 <div class="wineRing" style="right:-35px;top:-35px;border-color:rgba(255,255,255,.23);border-left-color:transparent"></div>
 <div class="micro" style="color:#eac7d2">Vintage ${new Date().getFullYear()}</div>
 <div class="display" style="font-size:38px;margin:8px 0">${S.batch?.name||j.name}</div>
 <div style="font-size:13px;opacity:.9;margin-bottom:18px">${j.name} · ${abv()||j.target_abv}${abv()?'%':''}</div>
 <div style="background:#fffaf0;color:var(--ink);border-radius:18px;padding:16px;margin-bottom:14px">
  <div class="micro">Vintage notes</div>
  <p style="font-size:14px;line-height:1.55;margin-top:6px">${j.tasting_notes_template||'Made at home with confidence, chaos and a little swagger.'}</p>
 </div>
 <div class="stamp" style="color:#fff;border-color:rgba(255,255,255,.65);background:rgba(255,255,255,.06)">Make wine. Make friends. Make some trouble.</div>
</div>
<button class="btn" onclick="alert('In the next build this can save/share a PNG vintage card.')" style="width:100%;margin-top:14px">Save vintage card</button>
<button class="btn alt" onclick="set({batch:null,startedAt:null,completed:{...S.completed,[S.selectedJourney]:0},tab:'journeys'})" style="width:100%;margin-top:10px">Start another batch</button>
</div>`+nav()
}
function renderProfile(){
return top('Glug Plonk','Private beta')+`<div class="screen fade">
<div class="card" style="padding:18px">
${logoBlock(52)}
<div class="hand" style="color:var(--merlot);font-size:20px;font-weight:900;margin:10px 0">No snobbery. Just fermentation.</div>
<p class="small">This build is designed for you and beta friends. It uses your Excel database as the content engine: journeys, phases, steps, ingredients, equipment and troubleshooting.</p>
<hr>
<div class="micro">Palette</div><div class="row" style="margin-top:8px">${palette.map(c=>`<span style="width:36px;height:24px;border-radius:9px;background:${c};border:1px solid var(--line)"></span>`).join('')}</div>
</div>
</div>`+nav()
}
function draw(){
if(S.screen==='welcome'){app.innerHTML=renderWelcome();return}
if(S.tab==='journeys') app.innerHTML=renderJourneys();
else if(S.tab==='overview') app.innerHTML=renderOverview();
else if(S.tab==='batch') app.innerHTML=renderBatch();
else if(S.tab==='task') app.innerHTML=renderTask();
else if(S.tab==='log') app.innerHTML=renderLog();
else if(S.tab==='help') app.innerHTML=renderHelp();
else if(S.tab==='vintage') app.innerHTML=renderVintage();
else if(S.tab==='profile') app.innerHTML=renderProfile();
}
draw();
</script>
</body>
</html>
